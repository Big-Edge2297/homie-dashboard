/**
 * refreshAllUI — calls all UI update functions that read from the state cache.
 * Also skips chip updates while the control popup is open to avoid layout thrash.
 */
function refreshAllUI() {
  refreshHomeStats();
  refreshSensors();
  refreshWeather();
  const popupOpen = document.getElementById("popup-overlay")?.classList.contains("open");
  if (!popupOpen) {
    refreshControls();
    refreshNotifications();
  } else {
    // Popup is open — live-refresh any visible AC cards from _acCardState
    // so external changes (remote, HA automations) show up inside the popup too.
    refreshOpenAcCards();
  }
  refreshMusic();
}

/**
 * refreshOpenAcCards — re-hydrates all AC cards currently rendered inside
 * the popup from _acCardState. Called on every poll cycle while the popup
 * is open so external mode/state changes appear without closing and reopening.
 */
function refreshOpenAcCards() {
  for (let ci = 0; ci < activeControls.length; ci++) {
    const c = activeControls[ci];
    if (!c._isClimate && !c._flatSubs) continue;
    const subs = c._flatSubs || c.subEntities || [];
    for (let j = 0; j < subs.length; j++) {
      const s = subs[j];
      if (!s.entity.startsWith("climate.")) continue;
      const mem = _acCardState.get(s.entity);
      if (!mem) continue;
      const card = document.getElementById(`sub-${ci}-${j}`);
      if (!card) continue;
      updateMushroomAcCard(ci, j, mem.isOn, {
        entity_id: s.entity,
        state: mem.isOn ? mem.mode : "off",
        attributes: { hvac_mode: mem.isOn ? mem.mode : "off", fan_mode: mem.fanMode, temperature: mem.targetTemp }
      });
    }
  }
}

/**
 * syncAcCardStateFromCache — walks every climate sub-entity across all controls
 * and updates _acCardState from the fresh HA state cache. Called after every
 * full cache refresh so that external changes (remote control, HA automations,
 * other apps) are reflected in the dashboard within one poll cycle.
 *
 * Skipped while the AC popup is open to avoid overwriting in-progress
 * user interactions mid-gesture.
 */
function syncAcCardStateFromCache() {
  const popupOpen = document.getElementById("popup-overlay")?.classList.contains("open");
  if (popupOpen) return;

  for (const c of activeControls) {
    const allSubs = c.subGroups
      ? c.subGroups.flatMap(g => (g.subEntities || []).filter(s => s.entity))
      : (c.subEntities || []);
    for (const s of allSubs) {
      if (!s.entity.startsWith("climate.")) continue;
      const d = stateCache.get(s.entity);
      if (!d) continue;
      const haState  = d.state;                          // "cool", "heat", "off", …
      const haMode   = d.attributes?.hvac_mode || haState;
      const haFan    = d.attributes?.fan_mode  || "auto";
      const haTemp   = d.attributes?.temperature ?? "—";
      const isOn     = haState !== "off" && haState !== "unavailable" && haState !== "unknown";
      _acCardState.set(s.entity, { isOn, mode: isOn ? haMode : "", fanMode: haFan, targetTemp: haTemp });
    }
  }
}

/**
 * syncPurifierCardStateFromCache — mirrors syncAcCardStateFromCache for fan
 * (purifier) entities. Seeds _purifierCardState from the HA state cache after
 * every poll so the correct percentage is available the first time a popup opens,
 * without requiring the user to interact with the card first.
 *
 * Skipped while the controls popup is open to avoid overwriting in-progress
 * user interactions.
 */
function syncPurifierCardStateFromCache() {
  const popupOpen = document.getElementById("popup-overlay")?.classList.contains("open");
  if (popupOpen) return;

  for (const c of activeControls) {
    const allSubs = c.subGroups
      ? c.subGroups.flatMap(g => (g.subEntities || []).filter(s => s.entity))
      : (c.subEntities || []);
    for (const s of allSubs) {
      if (!s.entity.startsWith("fan.")) continue;
      const d = stateCache.get(s.entity);
      if (!d) continue;
      const isOn = d.state === "on";
      const pct  = d.attributes?.percentage != null && d.attributes.percentage > 0
        ? Math.round(d.attributes.percentage)
        : (_purifierCardState.get(s.entity)?.pct ?? (isOn ? 50 : 0));
      _purifierCardState.set(s.entity, { isOn, pct });
    }
  }
}

/**
 * refreshAll — called by the fallback poll interval when the WebSocket is
 * disconnected. When WS is live this is effectively a no-op (refreshStateCache
 * returns immediately) and refreshAllUI re-paints from the already-live cache.
 */
async function refreshAll() {
  await refreshStateCache();
  syncAcCardStateFromCache();        // keep _acCardState in sync with external changes
  syncPurifierCardStateFromCache();  // keep _purifierCardState in sync
  refreshAllUI();
}

/**
 * init — bootstraps the dashboard on first load.
 * Sets up the initial room, builds static UI elements, starts the
 * clock ticker, opens the WebSocket connection, and starts a lightweight
 * fallback poll that only does real work when the WebSocket is disconnected.
 */
function init() {
  document.getElementById("hero-bg").style.backgroundImage = `url('${CONFIG.backgroundImage}')`;
  document.getElementById("hero-title").textContent = CONFIG.welcomeText;
  document.getElementById("hero-stats").innerHTML = renderHomeStats();
  buildSensorRow();
  buildControls(activeControls);
  tickClock(); // immediate clock render
  tick();      // immediate greeting render

  // Apply petName from CONFIG to the button label and popup title
  const petName = CONFIG.petName || "Pet";
  const catBtnEl = document.getElementById("cat-btn");
  if (catBtnEl) catBtnEl.textContent = petName.toUpperCase();
  const catTitleEl = document.querySelector("#cat-overlay .popup-title");
  if (catTitleEl) catTitleEl.textContent = `${petName}'s Status`;

  // Open the WebSocket — this triggers the auth handshake, get_states bulk
  // load, and state_changed subscription automatically.
  _wsConnect();

  // Fallback poll: fires every 15 s but refreshStateCache() returns immediately
  // when the WebSocket is live, so there is no redundant HTTP traffic under
  // normal conditions. It only becomes a real poll when WS is disconnected.
  const FALLBACK_POLL_MS  = 15_000;
  const MUSIC_INTERVAL_MS =  2_000; // music progress bar update (kept on timer)

  setInterval(tickClock,    1_000);
  setInterval(tick,         FALLBACK_POLL_MS);
  setInterval(refreshAll,   FALLBACK_POLL_MS);
  setInterval(refreshMusic, MUSIC_INTERVAL_MS);

  measureBottomArea();
  window.addEventListener("resize", measureBottomArea);
}

/**
 * requestFullscreen — enters browser fullscreen mode on first tap.
 * Useful for wall-mounted tablet installations.
 */
function requestFullscreen() {
  const el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
}

/* ─── THEME PICKER ────────────────────────────────────────────────────────
 * Applies one of four colour themes by swapping CSS custom properties on :root.
 * The chosen theme is persisted to localStorage so it survives page reloads.
 * ────────────────────────────────────────────────────────────────────────── */
const THEMES = {
  gold:      { accent: '#b8965c', hi: '#d4ae78', glow: 'var(--ac-2)' },
  copper:    { accent: '#b8745c', hi: '#d48c78', glow: 'rgba(184,116,92,0.2)' },
  terracotta:{ accent: '#e08b69', hi: '#b86d52', glow: 'rgba(224,139,105,0.2)' },
  blue:      { accent: '#5c8bb8', hi: '#78aad4', glow: 'rgba(92,139,184,0.2)' },
  cyan:      { accent: '#78d4d4', hi: '#5cb8b8', glow: 'rgba(120,212,212,0.2)' },
  emerald:   { accent: '#5cb881', hi: '#78d49a', glow: 'rgba(92,184,129,0.2)' },
  amethyst:  { accent: '#b58ade', hi: '#8e6bb0', glow: 'rgba(181,138,222,0.2)' },
  yellow:    { accent: '#f2cf41', hi: '#c2a32d', glow: 'rgba(242,207,65,0.2)'  },
  crimson:   { accent: '#e63946', hi: '#a32a33', glow: 'rgba(230,57,70,0.2)'   },
};

let _activeTheme = localStorage.getItem('homie-theme') || 'gold';

function applyTheme(id) {
  const t = THEMES[id];
  if (!t) return;
  _activeTheme = id;
  const root = document.documentElement;

  // Parse hex accent colour into r,g,b components
  function hexToRgb(hex) {
    const h = hex.replace('#','');
    return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
  }
  const [ar,ag,ab] = hexToRgb(t.accent);
  const [hr,hg,hb] = hexToRgb(t.hi);
  const ac = (op) => `rgba(${ar},${ag},${ab},${op})`;
  const hi = (op) => `rgba(${hr},${hg},${hb},${op})`;

  root.style.setProperty('--accent',      t.accent);
  root.style.setProperty('--accent-hi',   t.hi);
  root.style.setProperty('--accent-glow', ac(0.2));
  // accent opacity variants
  root.style.setProperty('--ac-05',  ac(0.05));
  root.style.setProperty('--ac-06',  ac(0.06));
  root.style.setProperty('--ac-08',  ac(0.08));
  root.style.setProperty('--ac-1',   ac(0.1));
  root.style.setProperty('--ac-12',  ac(0.12));
  root.style.setProperty('--ac-15',  ac(0.15));
  root.style.setProperty('--ac-18',  ac(0.18));
  root.style.setProperty('--ac-2',   ac(0.2));
  root.style.setProperty('--ac-25',  ac(0.25));
  root.style.setProperty('--ac-3',   ac(0.3));
  root.style.setProperty('--ac-35',  ac(0.35));
  root.style.setProperty('--ac-4',   ac(0.4));
  root.style.setProperty('--ac-45',  ac(0.45));
  root.style.setProperty('--ac-5',   ac(0.5));
  root.style.setProperty('--ac-55',  ac(0.55));
  root.style.setProperty('--ac-6',   ac(0.6));
  root.style.setProperty('--ac-7',   ac(0.7));
  root.style.setProperty('--ac-85',  ac(0.85));
  // accent-hi opacity variants
  root.style.setProperty('--hi-18',  hi(0.18));
  root.style.setProperty('--hi-2',   hi(0.2));
  root.style.setProperty('--hi-25',  hi(0.25));
  root.style.setProperty('--hi-5',   hi(0.5));
  root.style.setProperty('--hi-55',  hi(0.55));
  root.style.setProperty('--hi-7',   hi(0.7));
  root.style.setProperty('--hi-75',  hi(0.75));
  root.style.setProperty('--hi-8',   hi(0.8));
  root.style.setProperty('--hi-85',  hi(0.85));

  // Update active state on buttons
  document.querySelectorAll('.theme-option').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.theme === id);
  });
  localStorage.setItem('homie-theme', id);
  haptic('light');
  // Close picker and return to overview after a short delay so the checkmark is visible
  setTimeout(() => {
    document.getElementById('theme-overlay').classList.remove('open');
  }, 300);
}

function openThemePicker() {
  haptic('light');
  // Sync active state before opening
  document.querySelectorAll('.theme-option').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.theme === _activeTheme);
  });
  document.getElementById('theme-overlay').classList.add('open');
}

function closeThemePicker(e) {
  if (!e || e.target === document.getElementById('theme-overlay')) {
    document.getElementById('theme-overlay').classList.remove('open');
  }
}

// Apply saved theme on load
applyTheme(_activeTheme);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeThemePicker();
});

/* ─── END THEME PICKER ─────────────────────────────────────────────────── */

document.addEventListener("click", requestFullscreen, { once: true });
init();
