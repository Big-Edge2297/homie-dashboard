/**
 * buildControls — renders the chip buttons at the bottom of the screen.
 * @param {Array} controls — array of control objects (from activeControls)
 * Chips with subEntities or subGroups open a popup; others toggle directly.
 */
function buildControls(controls) {
  const list = controls || CONFIG.controls;
  const hasPopup = c => c.subEntities || c.subGroups;
  const chips = list.map((c, i) => `
    <div class="chip${c.on ? " on" : ""}" id="chip-${i}" onclick="${hasPopup(c) ? `openPopup(${i})` : `toggleControl(${i})`}" data-ctrl-index="${i}">
      <div class="dot"></div>${escapeHtml(c.label)}${c.showCount ? `<span class="chip-count" id="chip-count-${i}" style="display:none"></span>` : ''}${hasPopup(c) ? ' ›' : ''}
    </div>
  `).join('');
  document.getElementById("controls-row").innerHTML = chips;
}

/**
 * toggleControl — toggles a chip control that has no sub-entities popup.
 * @param {number} i — index into activeControls
 */
async function toggleControl(i) {
  haptic("medium");
  const c = activeControls[i];
  if (!c || !c.entity) return;
  const el = document.getElementById(`chip-${i}`);
  const isOn = el && el.classList.contains("on");
  const domain = c.entity.split(".")[0];
  let service;
  if (domain === "cover") {
    service = isOn ? "close_cover" : "open_cover";
  } else {
    service = isOn ? "turn_off" : "turn_on";
  }
  if (el) el.classList.toggle("on", !isOn);
  await haCall(domain, service, c.entity);
}

/**
 * entityIsOn — normalises "is this entity active?" across different domains.
 * Covers lights/switches (on), covers (open/opening), and climate (not off).
 * @param {string} state  — the raw HA state string
 * @param {string} entity — the full entity_id (used to detect domain)
 * @returns {boolean}
 */
function entityIsOn(state, entity) {
  const domain = entity.split(".")[0];
  if (domain === "cover")   return ["open","opening"].includes(state);
  if (domain === "climate") return state !== "off";
  return ["on","running"].includes(state);
}

/**
 * refreshControls — reads each control entity from cache and updates chip
 * on/off state and the active-count badge (e.g. "3 on").
 */
function refreshControls() {
  for (let i = 0; i < activeControls.length; i++) {
    const c = activeControls[i];
    let isOn = false;

    if (c.entity) {
      const d = haGetCached(c.entity);
      if (d) isOn = entityIsOn(d.state, c.entity);
    }

    if (c.showCount) {
      let activeCount;
      // For climate chips: derive count from _acCardState (instant, no HA poll needed).
      // This covers both countEntity and subEntities cases for AC.
      const allSubs = c.subGroups
        ? c.subGroups.flatMap(g => (g.subEntities || []).filter(s => s.entity))
        : (c.subEntities || []);
      const isClimatChip = allSubs.length > 0 && allSubs[0].entity.startsWith("climate.");
      if (isClimatChip && allSubs.some(s => _acCardState.has(s.entity))) {
        // Use in-memory card state — reflects toggles immediately
        activeCount = allSubs.filter(s => {
          const mem = _acCardState.get(s.entity);
          if (mem) return mem.isOn;
          const d = haGetCached(s.entity);
          return d && entityIsOn(d.state, s.entity);
        }).length;
      } else if (c.countEntity) {
        const cd = haGetCached(c.countEntity);
        activeCount = cd ? parseInt(cd.state, 10) || 0 : 0;
      } else {
        activeCount = allSubs.filter(s => {
          const d = haGetCached(s.entity);
          return d && entityIsOn(d.state, s.entity);
        }).length;
      }
      isOn = activeCount > 0;
      const countEl = document.getElementById(`chip-count-${i}`);
      if (countEl) {
        if (activeCount > 0) {
          countEl.textContent = `${activeCount} on`;
          countEl.style.display = "";
        } else {
          countEl.style.display = "none";
        }
      }
    }

    c.on = isOn;
    const el = document.getElementById(`chip-${i}`);
    if (el) el.classList.toggle("on", isOn);
  }
}

/**
 * refreshNotifications — checks each notification entity in CONFIG and
 * shows the notification bar if any are "on". Hidden on non-home rooms.
 */
function refreshNotifications() {
  const bar = document.getElementById("notification-bar");
  if (!bar || !CONFIG.notifications) return;
  const active = CONFIG.notifications.filter(n => {
    const d = haGetCached(n.entity);
    return d && d.state === "on";
  });
  if (active.length === 0) {
    bar.classList.remove("visible");
    bar.innerHTML = "";
  } else {
    bar.innerHTML = active.map(n => `
      <div class="notification-item">
        <div class="notification-dot"></div>
        <span>${escapeHtml(n.label)}</span>
      </div>
    `).join('<span style="opacity:0.3;margin:0 4px">·</span>');
    bar.classList.add("visible");
  }
}

/* ─── MUSIC PLAYER REFRESH ─── */
/**
 * mediaCommand — sends a media player command to HA (play, pause, next, prev)
 * and immediately refreshes the cache and music bar so the icon updates fast.
 * @param {string} service — HA media_player service name
 */
async function mediaCommand(service) {
  haptic("light");
  await haCall("media_player", service, CONFIG.musicEntity);
  // Refresh cache immediately so the icon updates without waiting for the next cycle
  await refreshStateCache();
  refreshMusic();
}

/**
 * refreshMusic — updates the Now Playing bar with current track info
 * and play/pause state. Only visible on the Overview (home) screen.
 *
 * When playback stops the bar stays visible for MUSIC_HIDE_DELAY_MS before
 * fading out, so a brief pause or source switch doesn't cause a jarring flash.
 */
const MUSIC_HIDE_DELAY_MS = 10_000; // 10 seconds grace period after music stops
let _musicHideTimer = null;         // pending setTimeout handle (or null)

function _hideMusicBar() {
  const bar = document.getElementById("music-player-bar");
  if (bar) {
    bar.style.opacity = "0";
    bar.classList.remove("playing");
  }
  _musicHideTimer = null;
}

function refreshMusic() {
  const d = haGetCached(CONFIG.musicEntity);
  const bar = document.getElementById("music-player-bar");

  if (!d || ["off", "idle", "unavailable", "unknown", "paused"].includes(d.state)) {
    // Music has stopped — start the grace-period timer if not already running
    if (!_musicHideTimer) {
      _musicHideTimer = setTimeout(_hideMusicBar, MUSIC_HIDE_DELAY_MS);
    }
    return;
  }

  // Music is active — cancel any pending hide and show the bar immediately
  clearTimeout(_musicHideTimer);
  _musicHideTimer = null;
  bar.style.opacity = "1";
  bar.classList.add("playing");

  const attrs = d.attributes || {};
  safeText("np-artist", attrs.media_artist || "Unknown Artist");
  safeText("np-track", attrs.media_title || "Unknown Track");

  // Sync play/pause icon to actual player state
  const iconPlay  = document.getElementById("np-icon-play");
  const iconPause = document.getElementById("np-icon-pause");
  if (iconPlay && iconPause) {
    const isPlaying = d.state === "playing";
    iconPlay.style.display  = isPlaying ? "none"  : "";
    iconPause.style.display = isPlaying ? ""      : "none";
  }

  // Progress bar
  if (attrs.media_duration && attrs.media_position !== undefined) {
    const progress = (attrs.media_position / attrs.media_duration) * 100;
    document.getElementById("np-progress-fill").style.width = progress + "%";
  }
}

/**
 * openPopup — opens the control detail popup for a chip.
 *
 * @param {number} i — index into activeControls
 */
async function openPopup(i) {
  haptic("light");
  const c = activeControls[i];
  document.getElementById("popup-title").textContent = c.label;
  const list = document.getElementById("popup-list");

  // ── Scene chip: render grouped scene bubbles, no entity state needed ────────
  if (c.isSceneChip) {
    let sceneHtml = "";
    (c.subGroups || []).forEach(group => {
      sceneHtml += `<div class="popup-group-label">${escapeHtml(group.label)}</div>`;
      sceneHtml += `<div class="popup-scenes-grid">`;
      (group.scenes || []).forEach((sc, idx) => {
        const bubbleId = `psb-${escapeHtml(group.label)}-${idx}`;
        sceneHtml += `
          <div class="popup-scene-bubble" onclick="triggerPopupScene('${sc.entity}','${bubbleId}')">
            <div class="popup-scene-icon" id="${bubbleId}" style="background:${sc.color}">${sc.icon}</div>
            <div class="popup-scene-label">${escapeHtml(sc.label)}</div>
          </div>`;
      });
      sceneHtml += `</div>`;
    });
    list.innerHTML = "";
    document.getElementById("popup-overlay").classList.add("open");
    document.querySelector("#popup-overlay .popup")?.classList.add("popup--scene");
    requestAnimationFrame(() => { list.innerHTML = sceneHtml; });
    return;
  }

  // ── Determine card type from entity domain ───────────────────────────────
  // Fall back to first sub-entity domain when parent is a group/null.
  const parentDomain    = c.entity ? c.entity.split(".")[0] : "";
  const firstSubForType = c.subGroups
    ? c.subGroups.flatMap(g => g.subEntities || []).find(s => s.entity)
    : (c.subEntities?.[0]);
  const firstSubDomain  = firstSubForType?.entity ? firstSubForType.entity.split(".")[0] : "";
  const effectiveDomain = (parentDomain && parentDomain !== "group") ? parentDomain : firstSubDomain;
  const isLightControl     = effectiveDomain === "light";
  const isClimateControl  = effectiveDomain === "climate";
  const isCoverControl    = effectiveDomain === "cover";
  const isPurifierControl = effectiveDomain === "fan";

  const COLOR_PRESETS = [
    { label: "Red",    rgb: [255,80,80] },
    { label: "Orange", rgb: [255,160,50] },
    { label: "Yellow", rgb: [255,230,100] },
    { label: "Green",  rgb: [80,200,120] },
    { label: "Cyan",   rgb: [80,200,220] },
    { label: "Blue",   rgb: [80,130,255] },
    { label: "Purple", rgb: [160,80,255] },
    { label: "Pink",   rgb: [255,100,180] },
  ];
  const TEMP_PRESETS = [
    { label: "Warm",    mireds: 370 },
    { label: "Neutral", mireds: 250 },
    { label: "Cool",    mireds: 153 },
  ];

  // ── Accordion: render two-level group accordion for subGroups chips ────────
  if (!c.noRoomGrouping && c.subGroups) {
    // Build a flat list of all sub-entities across all groups, tracking offsets
    let flatSubs = [];
    const groupMeta = c.subGroups.map(group => {
      const startIdx = flatSubs.length;
      (group.subEntities || []).forEach(s => flatSubs.push(s));
      return { label: group.label, startIdx, count: group.subEntities ? group.subEntities.length : 0 };
    });

    // Synthesise a room-id from the group label for stable DOM ids
    const roomIdOf = label => label.toLowerCase().replace(/\s+/g, "_");

    let accordionHtml = groupMeta.map(({ label, startIdx, count }) => {
      const rid = roomIdOf(label);
      return `
        <div class="popup-room-row" id="room-row-${rid}" onclick="toggleRoomAccordion('${rid}',${i},${startIdx},${count})">
          <div class="popup-room-row-left">
            <span class="popup-room-name">${escapeHtml(label)}</span>
            <span class="popup-room-badge" id="room-badge-${rid}"></span>
          </div>
          <span class="popup-room-chevron">›</span>
        </div>
        <div class="popup-room-panel" id="room-panel-${rid}"></div>`;
    }).join('');

    c._flatSubs      = flatSubs;
    c._colorPresets  = COLOR_PRESETS;
    c._tempPresets   = TEMP_PRESETS;
    c._isLight       = isLightControl;
    c._isClimate     = isClimateControl;
    c._isCover       = isCoverControl;
    c._isPurifier    = isPurifierControl;

    list.innerHTML = "";
    document.getElementById("popup-overlay").classList.add("open");
    // Compact width for accordion room-list view
    document.querySelector("#popup-overlay .popup")?.classList.add("popup--compact");
    requestAnimationFrame(() => {
      list.innerHTML = accordionHtml;

      // Populate active-count badges from cache
      groupMeta.forEach(({ label, startIdx, count }) => {
        const rid  = roomIdOf(label);
        const subs = flatSubs.slice(startIdx, startIdx + count);
        const activeCount = subs.filter(s => {
          const d = haGetCached(s.entity);
          if (!d) return false;
          if (isClimateControl) return d.state !== "off" && d.state !== "unavailable" && d.state !== "unknown";
          if (isCoverControl)   return ["open","opening"].includes(d.state);
          return !["off","closed","unavailable","unknown"].includes(d.state);
        }).length;
        const badge = document.getElementById(`room-badge-${rid}`);
        if (badge && activeCount > 0) {
          badge.textContent = activeCount + " on";
          badge.classList.add("visible");
        }
      });
    });
    return; // accordion rendered — done
  }

  // ── Flat list or noRoomGrouping subGroups ───────────────────────────────
  let html = '';
  let flatSubs = [];

  if (c.subGroups) {
    c.subGroups.forEach(group => {
      // All groups render as a flat label + items
      html += `<div class="popup-group-label">${escapeHtml(group.label)}</div>`;
      (group.subEntities || []).forEach(s => {
        if (s.expandable) {
          // ── Inline expandable row (e.g. HW Circulation) ──────────────────
          const gid = s.label.toLowerCase().replace(/\s+/g, "_");
          const activeCount = (s.subEntities || []).filter(z => {
            const d = haGetCached(z.entity);
            return d && !["off","closed","unavailable","unknown"].includes(d.state);
          }).length;
          const badge = `<span class="popup-room-badge${activeCount > 0 ? " visible" : ""}" style="margin-left:8px">${activeCount > 0 ? activeCount + " on" : ""}</span>`;
          html += `
            <div class="mush-switch-card" id="exprow-${gid}"
                 onclick="toggleExpandableGroup('${gid}',${i})"
                 style="cursor:pointer;user-select:none">
              <div class="mush-switch-top">
                <div class="mush-switch-icon">${switchIconFor(s.label, "switch")}</div>
                <div class="mush-switch-meta">
                  <div class="mush-switch-name" style="display:flex;align-items:center">
                    ${escapeHtml(s.label)}${badge}
                  </div>
                  <div class="mush-switch-status">Tap to expand</div>
                </div>
                <span id="expchev-${gid}" style="font-size:15px;color:rgba(255,255,255,0.35);transition:transform 0.2s;flex-shrink:0">›</span>
              </div>
            </div>
            <div id="exppanel-${gid}" style="display:none;padding:2px 0 6px"></div>`;
          if (!c._expandableGroups) c._expandableGroups = {};
          c._expandableGroups[gid] = { subEntities: s.subEntities, built: false };
        } else {
          // ── Regular toggle item ───────────────────────────────────────────
          const j = flatSubs.length;
          flatSubs.push(s);
          const domain = s.entity.split(".")[0];
          if (isLightControl) {
            html += buildMushroomCard(i, j, s, COLOR_PRESETS, TEMP_PRESETS);
          } else if (isClimateControl) {
            html += buildMushroomAcCard(i, j, s);
          } else if (isCoverControl) {
            html += buildMushroomCoverCard(i, j, s);
          } else if (isPurifierControl) {
            html += buildMushroomPurifierCard(i, j, s);
          } else if (domain === "switch" || domain === "input_boolean" || domain === "fan") {
            html += buildMushroomSwitchCard(i, j, s);
          } else {
            html += `<div class="popup-item" id="sub-${i}-${j}" onclick="toggleSubEntity(event,${i},${j})">
              <span class="popup-item-label">${escapeHtml(s.label)}</span><div class="popup-toggle"></div></div>`;
          }
        }
      });
    });
  } else {
    flatSubs = c.subEntities || [];
    flatSubs.forEach((s, j) => {
      if (isLightControl) {
        html += buildMushroomCard(i, j, s, COLOR_PRESETS, TEMP_PRESETS);
      } else if (isClimateControl) {
        html += buildMushroomAcCard(i, j, s);
      } else if (isCoverControl) {
        html += buildMushroomCoverCard(i, j, s);
      } else if (isPurifierControl) {
        html += buildMushroomPurifierCard(i, j, s);
      } else {
        html += `<div class="popup-item" id="sub-${i}-${j}" onclick="toggleSubEntity(event,${i},${j})">
          <span class="popup-item-label">${escapeHtml(s.label)}</span><div class="popup-toggle"></div></div>`;
      }
    });
  }

  c._flatSubs = flatSubs;
  list.innerHTML = c.twoColumnGrid ? `<div class="popup-two-col-grid">${html}</div>` : html;
  document.getElementById("popup-overlay").classList.add("open");
  // Narrow width for flat entity lists (bath, irrigation, AC single-room, etc.)
  document.querySelector("#popup-overlay .popup")?.classList.add("popup--narrow");

  // For climate: use _acCardState (in-memory) if available; fetch HA only on first open.
  // For all other domains: always fetch from HA via haGet (which uses the cache when fresh).
  if (isClimateControl) {
    const allInMemory = flatSubs.every(s => _acCardState.has(s.entity));
    if (allInMemory) {
      flatSubs.forEach((s, j) => {
        const mem = _acCardState.get(s.entity);
        updateMushroomAcCard(i, j, mem.isOn, {
          entity_id: s.entity,
          state: mem.isOn ? mem.mode : "off",
          attributes: { hvac_mode: mem.isOn ? mem.mode : "off", fan_mode: mem.fanMode, temperature: mem.targetTemp }
        });
      });
    } else {
      const states = await Promise.all(flatSubs.map(s => haGet(s.entity)));
      states.forEach((d, j) => {
        const state = d ? d.state : "unknown";
        const isOn  = state !== "off" && state !== "unavailable" && state !== "unknown" && state !== "";
        updateMushroomAcCard(i, j, isOn, d);
      });
    }
  } else {
    const states = await Promise.all(flatSubs.map(s => haGet(s.entity)));
    states.forEach((d, j) => {
      const s = flatSubs[j];
      const state = d ? d.state : "unknown";
      let isOn;
      if (isCoverControl) {
        isOn = ["open","opening"].includes(state);
      } else {
        isOn = d && !["off","closed","unavailable","unknown"].includes(state);
      }
      if (isLightControl) {
        updateMushroomCard(i, j, isOn, d);
      } else if (isCoverControl) {
        updateMushroomCoverCard(i, j, isOn, d);
      } else if (isPurifierControl) {
        updateMushroomPurifierCard(i, j, isOn, d);
      } else {
        const domain = s.entity.split(".")[0];
        if (domain === "switch" || domain === "input_boolean" || domain === "fan") {
          updateMushroomSwitchCard(i, j, isOn);
        } else {
          const el = document.getElementById(`sub-${i}-${j}`);
          if (el) el.classList.toggle("on", isOn);
        }
      }
    });
  }
}


/**
 * toggleExpandableGroup — expands/collapses an inline expandable subGroup
 * (e.g. HW Circulation inside the Bath flat popup).
 * Builds switch cards lazily on first open, then reuses the HTML.
 */
async function toggleExpandableGroup(gid, ctrlIdx) {
  haptic("light");
  const c     = activeControls[ctrlIdx];
  const panel = document.getElementById(`exppanel-${gid}`);
  const chev  = document.getElementById(`expchev-${gid}`);
  const def   = c._expandableGroups && c._expandableGroups[gid];
  if (!panel || !def) return;

  const isOpen = panel.style.display !== "none";
  if (isOpen) {
    panel.style.display = "none";
    if (chev) chev.style.transform = "";
    return;
  }

  panel.style.display = "block";
  if (chev) chev.style.transform = "rotate(90deg)";

  // Build cards once
  if (!def.built) {
    def.built = true;
    const baseJ = (c._flatSubs || []).length;
    def.subEntities.forEach((s, k) => {
      if (!c._flatSubs) c._flatSubs = [];
      c._flatSubs[baseJ + k] = s;
    });
    panel.innerHTML = def.subEntities.map((s, k) =>
      buildMushroomSwitchCard(ctrlIdx, baseJ + k, s)
    ).join("");
    def.baseJ = baseJ;
  }

  // Hydrate states
  const states = await Promise.all(def.subEntities.map(s => haGet(s.entity)));
  states.forEach((d, k) => {
    const isOn = d && !["off","closed","unavailable","unknown"].includes(d.state);
    updateMushroomSwitchCard(ctrlIdx, def.baseJ + k, isOn);
  });
  const activeCount = states.filter(d => d && !["off","closed","unavailable","unknown"].includes(d.state)).length;
  const badge = document.querySelector(`#exprow-${gid} .popup-room-badge`);
  if (badge) {
    badge.textContent = activeCount > 0 ? `${activeCount} on` : "";
    badge.classList.toggle("visible", activeCount > 0);
  }
}

/** Pick a contextual icon based on the entity domain and label */
function switchIconFor(label, domain, entity) {
  const l = label.toLowerCase();
  const e = (entity || "").toLowerCase();
  if (domain === "fan")           return FAN_ICON;
  if (l.includes("towel"))        return TOWEL_WARMER_ICON;
  if (l.includes("heater") || l.includes("water heater")) return WATER_HEATER_ICON;
  if (l.includes("circ") || e.includes("hw_circ")) return HW_CIRC_ICON;
  return SWITCH_ICON;
}

/**
 * buildMushroomSwitchCard — renders a simple on/off switch card.
 */
function buildMushroomSwitchCard(i, j, s) {
  const domain = s.entity ? s.entity.split(".")[0] : "switch";
  return `
    <div class="mush-switch-card" id="sub-${i}-${j}" data-entity="${escapeHtml(s.entity)}"
         onclick="toggleSubEntity(event,${i},${j})">
      <div class="mush-switch-top">
        <div class="mush-switch-icon" id="swicon-${i}-${j}">
          ${switchIconFor(s.label, domain, s.entity)}
        </div>
        <div class="mush-switch-meta">
          <div class="mush-switch-name">${escapeHtml(s.label)}</div>
          <div class="mush-switch-status" id="swstatus-${i}-${j}">Off</div>
        </div>
        <div class="popup-toggle" id="swtoggle-${i}-${j}"></div>
      </div>
    </div>`;
}

/**
 * updateMushroomSwitchCard — syncs the rendered card to the current on/off state.
 */
function updateMushroomSwitchCard(i, j, isOn) {
  const card     = document.getElementById(`sub-${i}-${j}`);
  const statusEl = document.getElementById(`swstatus-${i}-${j}`);
  if (card)     card.classList.toggle("on", isOn);
  if (statusEl) statusEl.textContent = isOn ? "On" : "Off";
}

const AC_POWER_ICON = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">

// Air-conditioning unit icon (used as the left status icon — always shown)
const AC_UNIT_ICON = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">

  <path d="M6 9h.01M9 9h6"/>

const AC_MODE_CLASSES = ["mode-cool","mode-heat","mode-fan","mode-dry"];

/**
 * _acCardState — in-memory store of the last-known live state for each AC
 * entity. Keyed by entity_id. Written on every updateMushroomAcCard call
 * and on every toggle/mode/fan change. This is the source of truth for the
 * card UI and is NEVER overwritten by a stale HA poll.
 */
const _acCardState = new Map();

/**
 * applyAcModeTheme — updates card class, icon SVG, status text, and
 * mode-button highlights for a given HVAC mode.
 */
function applyAcModeTheme(i, j, mode, isOn) {
  const card     = document.getElementById(`sub-${i}-${j}`);
  const iconWrap = document.getElementById(`acicon-${i}-${j}`);
  const statusEl = document.getElementById(`acstatus-${i}-${j}`);
  if (!card) return;

  AC_MODE_CLASSES.forEach(c => card.classList.remove(c));
  const meta = AC_MODE_META[mode];
  if (isOn && meta) {
    card.classList.add(meta.cls);
    if (iconWrap) iconWrap.innerHTML = meta.icon;
    if (statusEl) statusEl.textContent = mode.replace("_", " ");
  } else {
    if (iconWrap) iconWrap.innerHTML = meta ? meta.icon : AC_UNIT_ICON;
    if (statusEl) statusEl.textContent = isOn ? mode.replace("_"," ") : "Off";
  }

  ["cool","heat","fan_only","dry"].forEach(m => {
    document.getElementById(`acmode-${i}-${j}-${m}`)?.classList.toggle("active", isOn && m === mode);
  });
}

/**
 * buildMushroomAcCard — renders a climate entity card.
 * Controls are ALWAYS visible. The power button (top-right) toggles on/off.
 * Mode and fan buttons select settings while the unit is on.
 */
function buildMushroomAcCard(i, j, s) {
  const MODES      = ["cool","heat","fan_only","dry"];
  const FAN_SPEEDS = ["auto","low","medium","high"];

  const modeBtns = MODES.map(m =>
    `<button class="mush-ac-btn" id="acmode-${i}-${j}-${m}"
      onclick="event.stopPropagation();applyAcMode(${i},${j},'${m}')">${m.replace("_"," ")}</button>`
  ).join("");

  const fanBtns = FAN_SPEEDS.map(f =>
    `<button class="mush-ac-btn" id="acfan-${i}-${j}-${f}"
      onclick="event.stopPropagation();applyAcFan(${i},${j},'${f}')">${f}</button>`
  ).join("");

  return `
    <div class="mush-ac-card" id="sub-${i}-${j}" data-entity="${escapeHtml(s.entity)}">
      <div class="mush-ac-top">
        <div class="mush-ac-icon" id="acicon-${i}-${j}">
          ${AC_UNIT_ICON}
        </div>
        <div class="mush-ac-meta">
          <div class="mush-ac-name">${escapeHtml(s.label)}</div>
          <div class="mush-ac-status" id="acstatus-${i}-${j}">Off</div>
        </div>
        <div class="mush-ac-power-btn" onclick="event.stopPropagation();toggleAcPower(${i},${j})">${AC_POWER_ICON}</div>
      </div>
      <div class="mush-ac-controls">
        <div class="mush-ac-row">
          <div class="mush-ac-temp-display">
            <div class="mush-ac-nudge" onclick="event.stopPropagation();nudgeAcTemp(${i},${j},-1)">−</div>
            <div class="mush-ac-temp-val" id="actemp-${i}-${j}">—</div>
            <div class="mush-ac-nudge" onclick="event.stopPropagation();nudgeAcTemp(${i},${j},+1)">+</div>
          </div>
        </div>
        <div class="mush-ac-row">${modeBtns}</div>
        <div class="mush-ac-row">${fanBtns}</div>
      </div>
    </div>`;
}

/**
 * updateMushroomAcCard — syncs a rendered AC card to a HA climate state object.
 * Also writes to _acCardState so the card can be re-rendered without a network call.
 */
function updateMushroomAcCard(i, j, isOn, d) {
  const card = document.getElementById(`sub-${i}-${j}`);
  if (!card) return;
  card.classList.toggle("on", isOn);

  const attrs      = (d && d.attributes) || {};
  const targetTemp = attrs.temperature ?? "—";
  const mode       = attrs.hvac_mode || (isOn ? "cool" : "");
  const fanMode    = attrs.fan_mode  || "";

  // Write to in-memory card state so re-opens don't need a network call
  const entityId = (d && d.entity_id) || card.dataset.entity;
  if (entityId) {
    _acCardState.set(entityId, { isOn, mode, fanMode, targetTemp });
  }

  applyAcModeTheme(i, j, mode, isOn);

  const tempEl = document.getElementById(`actemp-${i}-${j}`);
  if (tempEl) tempEl.textContent = isOn && targetTemp !== "—" ? targetTemp + "°" : "—";

  ["auto","low","medium","high"].forEach(f => {
    document.getElementById(`acfan-${i}-${j}-${f}`)?.classList.toggle("active", isOn && f === fanMode);
  });
}

/**
 * toggleAcPower — power-only toggle. Does NOT default to "cool".
 * If turning on, it restores the last known mode from _acCardState,
 * or asks HA for the current state if unknown, then turns on.
 * If turning off, sends hvac_mode=off.
 */
async function toggleAcPower(i, j) {
  haptic("heavy");
  const c  = activeControls[i];
  const s  = (c._flatSubs || c.subEntities)[j];
  const el = document.getElementById(`sub-${i}-${j}`);
  if (!el || !s) return;

  const isOn = el.classList.contains("on");

  if (isOn) {
    // ── Turn OFF ──
    el.classList.remove("on");
    applyAcModeTheme(i, j, "", false);
    ["auto","low","medium","high"].forEach(f =>
      document.getElementById(`acfan-${i}-${j}-${f}`)?.classList.remove("active"));
    const tempEl = document.getElementById(`actemp-${i}-${j}`);
    if (tempEl) tempEl.textContent = "—";

    // Update in-memory state
    const prev = _acCardState.get(s.entity) || {};
    _acCardState.set(s.entity, { ...prev, isOn: false });

    // Update HA cache optimistically
    const cached = stateCache.get(s.entity);
    if (cached) stateCache.set(s.entity, { ...cached, state: "off", attributes: { ...cached.attributes, hvac_mode: "off" } });

    await haService("climate", "set_hvac_mode", { entity_id: s.entity, hvac_mode: "off" });
  } else {
    // ── Turn ON ──
    // Determine the mode to restore: prefer in-memory card state, then HA cache
    const prev      = _acCardState.get(s.entity);
    const cached    = stateCache.get(s.entity);
    const lastMode  = (prev && prev.mode && prev.mode !== "off" && prev.mode !== "")
      ? prev.mode
      : (cached?.attributes?.hvac_mode && cached.attributes.hvac_mode !== "off" ? cached.attributes.hvac_mode : "cool");
    const lastFan   = (prev && prev.fanMode) || cached?.attributes?.fan_mode || "auto";
    const lastTemp  = (prev && prev.targetTemp && prev.targetTemp !== "—") ? prev.targetTemp
      : cached?.attributes?.temperature ?? 24;

    el.classList.add("on");
    applyAcModeTheme(i, j, lastMode, true);
    ["auto","low","medium","high"].forEach(f =>
      document.getElementById(`acfan-${i}-${j}-${f}`)?.classList.toggle("active", f === lastFan));
    const tempEl = document.getElementById(`actemp-${i}-${j}`);
    if (tempEl) tempEl.textContent = lastTemp + "°";

    // Update in-memory state
    _acCardState.set(s.entity, { isOn: true, mode: lastMode, fanMode: lastFan, targetTemp: lastTemp });

    // Update HA cache optimistically
    if (cached) stateCache.set(s.entity, { ...cached, state: lastMode, attributes: { ...cached.attributes, hvac_mode: lastMode } });

    await haService("climate", "set_hvac_mode", { entity_id: s.entity, hvac_mode: lastMode });
  }
}

/**
 * applyAcMode — sends a set_hvac_mode command to HA and immediately updates
 * the card colour, icon, and mode-button highlights for instant feedback.
 */
async function applyAcMode(i, j, mode) {
  haptic("medium");
  const s = (activeControls[i]._flatSubs || activeControls[i].subEntities)[j];
  if (!s) return;
  applyAcModeTheme(i, j, mode, true);

  // Ensure card is marked as on
  const card = document.getElementById(`sub-${i}-${j}`);
  if (card) card.classList.add("on");

  // Update in-memory and HA cache
  const prev = _acCardState.get(s.entity) || {};
  _acCardState.set(s.entity, { ...prev, isOn: true, mode });
  const cached = stateCache.get(s.entity);
  if (cached) stateCache.set(s.entity, { ...cached, state: mode, attributes: { ...cached.attributes, hvac_mode: mode } });

  await haService("climate", "set_hvac_mode", { entity_id: s.entity, hvac_mode: mode });
}

/**
 * applyAcFan — sends a set_fan_mode command to HA and updates button state.
 */
async function applyAcFan(i, j, fanSpeed) {
  haptic("light");
  const s = (activeControls[i]._flatSubs || activeControls[i].subEntities)[j];
  if (!s) return;
  ["auto","low","medium","high"].forEach(f => {
    document.getElementById(`acfan-${i}-${j}-${f}`)?.classList.toggle("active", f === fanSpeed);
  });
  // Update in-memory state
  const prev = _acCardState.get(s.entity) || {};
  _acCardState.set(s.entity, { ...prev, fanMode: fanSpeed });
  const cached = stateCache.get(s.entity);
  if (cached) stateCache.set(s.entity, { ...cached, attributes: { ...cached.attributes, fan_mode: fanSpeed } });

  await haService("climate", "set_fan_mode", { entity_id: s.entity, fan_mode: fanSpeed });
}

/**
 * nudgeAcTemp — increments or decrements the target temperature by 1°
 * and sends a set_temperature command to HA.
 * @param {number} delta — +1 or -1
 */
async function nudgeAcTemp(i, j, delta) {
  haptic("light");
  const s = (activeControls[i]._flatSubs || activeControls[i].subEntities)[j];
  if (!s) return;
  const tempEl = document.getElementById(`actemp-${i}-${j}`);
  const current = parseFloat(tempEl?.textContent) || 24;
  const newTemp = Math.min(30, Math.max(16, current + delta));
  if (tempEl) tempEl.textContent = newTemp + "°";
  // Update in-memory state
  const prev = _acCardState.get(s.entity) || {};
  _acCardState.set(s.entity, { ...prev, targetTemp: newTemp });
  const cached = stateCache.get(s.entity);
  if (cached) stateCache.set(s.entity, { ...cached, attributes: { ...cached.attributes, temperature: newTemp } });

  await haService("climate", "set_temperature", { entity_id: s.entity, temperature: newTemp });
}


/**
 * _purifierCardState — in-memory store of the last-known live state for each
 * purifier (fan) entity. Keyed by entity_id. Written on every toggle/speed
 * change so re-opens are instant and optimistic updates survive poll cycles.
 */
const _purifierCardState = new Map();

// SVG icon for the purifier (air-filter style)
const PURIFIER_ICON = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
  <path d="M12 12 C12 7 16 4 17 7 C18 10 15 11 12 12Z"/>
  <path d="M12 12 C17 12 20 16 17 17 C14 18 13 15 12 12Z"/>
  <path d="M12 12 C12 17 8 20 7 17 C6 14 9 13 12 12Z"/>
  <path d="M12 12 C7 12 4 8 7 7 C10 6 11 9 12 12Z"/>
  <circle cx="12" cy="12" r="1.5" fill="rgba(255,255,255,0.5)" stroke="none"/>
</svg>`;

// Power icon (reuse the same shape as AC)
const PURIFIER_POWER_ICON = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
  <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
  <line x1="12" y1="2" x2="12" y2="12"/>
</svg>`;

const PURIFIER_SPEEDS = ["silent", "low", "medium", "high"];

/**
 * buildMushroomPurifierCard — renders a fan (air purifier) entity card.
 * A speed slider (0–100 %) is revealed below the header only when on.
 */
function buildMushroomPurifierCard(i, j, s) {
  return `
    <div class="mush-purifier-card" id="sub-${i}-${j}" data-entity="${escapeHtml(s.entity)}">
      <div class="mush-purifier-top">
        <div class="mush-purifier-icon" id="puricon-${i}-${j}">
          ${PURIFIER_ICON}
        </div>
        <div class="mush-purifier-meta">
          <div class="mush-purifier-name">${escapeHtml(s.label)}</div>
          <div class="mush-purifier-pct" id="purpct-${i}-${j}">Off</div>
        </div>
        <div class="mush-purifier-power-btn" onclick="event.stopPropagation();togglePurifierPower(${i},${j})">${PURIFIER_POWER_ICON}</div>
      </div>
      <div class="mush-purifier-controls">
        <div class="mush-purifier-track" id="purtrack-${i}-${j}">
          <div class="mush-purifier-fill" id="purfill-${i}-${j}" style="width:0%"></div>
          <input type="range" class="mush-purifier-input" id="purslider-${i}-${j}"
            min="1" max="100" value="50"
            oninput="onPurifierSlider(${i},${j},this.value)"
            onchange="applyPurifierFanPct(${i},${j},this.value)">
        </div>
      </div>
    </div>`;
}

/**
 * updateMushroomPurifierCard — syncs a rendered purifier card to a HA fan state.
 * Uses percentage (0–100) from attributes.percentage. Writes to _purifierCardState.
 */
function updateMushroomPurifierCard(i, j, isOn, d) {
  const card = document.getElementById(`sub-${i}-${j}`);
  if (!card) return;
  card.classList.toggle("on", isOn);

  const attrs    = (d && d.attributes) || {};
  // percentage is the canonical HA fan attribute; fall back to speed_pct or
  // the existing _purifierCardState so a null attribute never resets to 0%.
  const entityId = (d && d.entity_id) || card.dataset.entity;
  const prev     = entityId ? _purifierCardState.get(entityId) : null;
  let pct;
  if (attrs.percentage != null && attrs.percentage > 0) {
    pct = Math.round(attrs.percentage);
  } else if (prev && prev.pct != null && prev.pct > 0) {
    pct = prev.pct; // keep last known value — don't overwrite with 0
  } else {
    pct = isOn ? 50 : 0; // true cold start with no data
  }

  if (entityId) _purifierCardState.set(entityId, { isOn, pct });

  const pctEl  = document.getElementById(`purpct-${i}-${j}`);
  const fillEl = document.getElementById(`purfill-${i}-${j}`);
  const slEl   = document.getElementById(`purslider-${i}-${j}`);

  if (pctEl)  pctEl.textContent  = isOn ? pct + "%" : "Off";
  if (fillEl) fillEl.style.width = (isOn ? pct : 0) + "%";
  if (slEl)   slEl.value         = isOn ? pct : 0;
}

/**
 * togglePurifierPower — toggles on/off, restoring the last percentage.
 */
async function togglePurifierPower(i, j) {
  haptic("heavy");
  const c  = activeControls[i];
  const s  = (c._flatSubs || c.subEntities)[j];
  const el = document.getElementById(`sub-${i}-${j}`);
  if (!el || !s) return;

  const isOn = el.classList.contains("on");

  if (isOn) {
    // ── Turn OFF ──
    el.classList.remove("on");
    const pctEl  = document.getElementById(`purpct-${i}-${j}`);
    const fillEl = document.getElementById(`purfill-${i}-${j}`);
    const slEl   = document.getElementById(`purslider-${i}-${j}`);
    if (pctEl)  pctEl.textContent  = "Off";
    if (fillEl) fillEl.style.width = "0%";
    if (slEl)   slEl.value         = 0;

    const prev = _purifierCardState.get(s.entity) || {};
    _purifierCardState.set(s.entity, { ...prev, isOn: false });
    const cached = stateCache.get(s.entity);
    if (cached) stateCache.set(s.entity, { ...cached, state: "off" });

    await haService("fan", "turn_off", { entity_id: s.entity });
  } else {
    // ── Turn ON — restore last percentage ──
    const prev    = _purifierCardState.get(s.entity);
    const cached  = stateCache.get(s.entity);
    const lastPct = (prev && prev.pct != null && prev.pct > 0)
      ? prev.pct
      : (cached?.attributes?.percentage ?? 50);

    el.classList.add("on");
    const pctEl  = document.getElementById(`purpct-${i}-${j}`);
    const fillEl = document.getElementById(`purfill-${i}-${j}`);
    const slEl   = document.getElementById(`purslider-${i}-${j}`);
    if (pctEl)  pctEl.textContent  = lastPct + "%";
    if (fillEl) fillEl.style.width = lastPct + "%";
    if (slEl)   slEl.value         = lastPct;

    _purifierCardState.set(s.entity, { isOn: true, pct: lastPct });
    if (cached) stateCache.set(s.entity, { ...cached, state: "on",
      attributes: { ...cached.attributes, percentage: lastPct } });

    await haService("fan", "turn_on", { entity_id: s.entity, percentage: lastPct });
  }

  // Refresh accordion badge immediately
  if (_openAccordionRoomId) {
    const badge = document.getElementById(`room-badge-${_openAccordionRoomId}`);
    const panel = document.getElementById(`room-panel-${_openAccordionRoomId}`);
    if (badge && panel) {
      const onCount = panel.querySelectorAll(".popup-item.on, .mush-light-card.on, .mush-cover-card.on, .mush-ac-card.on, .mush-purifier-card.on").length;
      badge.textContent = onCount > 0 ? onCount + " on" : "";
      badge.classList.toggle("visible", onCount > 0);
    }
  }
}

/**
 * onPurifierSlider — live-updates the fill bar and pct label as the slider is dragged.
 */
function onPurifierSlider(i, j, val) {
  const fillEl = document.getElementById(`purfill-${i}-${j}`);
  const pctEl  = document.getElementById(`purpct-${i}-${j}`);
  if (fillEl) fillEl.style.width = val + "%";
  if (pctEl)  pctEl.textContent  = val + "%";
}

/**
 * applyPurifierFanPct — sends fan/turn_on with percentage when slider is released.
 */
async function applyPurifierFanPct(i, j, val) {
  haptic("light");
  const c = activeControls[i];
  const s = (c._flatSubs || c.subEntities)[j];
  if (!s) return;
  const pct = parseInt(val, 10);

  const card = document.getElementById(`sub-${i}-${j}`);
  if (card && !card.classList.contains("on")) card.classList.add("on");

  const prev = _purifierCardState.get(s.entity) || {};
  _purifierCardState.set(s.entity, { ...prev, isOn: true, pct });
  const cached = stateCache.get(s.entity);
  if (cached) stateCache.set(s.entity, { ...cached, state: "on",
    attributes: { ...cached.attributes, percentage: pct } });

  await haService("fan", "turn_on", { entity_id: s.entity, percentage: pct });
}

/**
 * buildMushroomCoverCard — renders a cover/blind entity card with:
 *   - a position slider (0 = closed → 100 = open) with fill bar
 *   - Open / Stop / Close quick-action buttons
 *   - Gold border when the cover is open
 * @param {number} i — control index
 * @param {number} j — sub-entity index
 * @param {Object} s — sub-entity {label, entity}
 */
function buildMushroomCoverCard(i, j, s) {
  const isCurtain = !!s.isCurtain;
  const svgStroke = "var(--ac-85)";
  const openIcon = isCurtain
    ? `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="${svgStroke}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`
    : `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="${svgStroke}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>`;
  const closeIcon = isCurtain
    ? `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="${svgStroke}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`
    : `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="${svgStroke}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>`;
  const stopIcon = `<svg width="15" height="15" viewBox="0 0 24 24" style="fill:var(--ac-18);stroke:var(--ac-7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2.5"/></svg>`;
  return `
    <div class="mush-cover-card" id="sub-${i}-${j}">
      <div class="mush-cover-top">
        <div class="mush-cover-icon" onclick="event.stopPropagation();toggleSubEntity(event,${i},${j})">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="12" y1="9" x2="12" y2="21"/>
          </svg>
        </div>
        <div class="mush-cover-meta">
          <div class="mush-cover-name">${escapeHtml(s.label)}</div>
          <div class="mush-cover-pos" id="coverpos-${i}-${j}">—</div>
        </div>
        <div class="mush-cover-icon-btns">
          <div class="mush-cover-icon-btn" onclick="event.stopPropagation();coverCommand(${i},${j},'open_cover')">${openIcon}</div>
          <div class="mush-cover-icon-btn" onclick="event.stopPropagation();coverCommand(${i},${j},'stop_cover')">${stopIcon}</div>
          <div class="mush-cover-icon-btn" onclick="event.stopPropagation();coverCommand(${i},${j},'close_cover')">${closeIcon}</div>
        </div>
      </div>
      <div class="mush-cover-slider-row">
        <div class="mush-cover-track">
          <div class="mush-cover-fill" id="coverfill-${i}-${j}" style="width:0%"></div>
          <input type="range" class="mush-cover-input" id="coverslider-${i}-${j}"
            min="0" max="100" value="0"
            oninput="onCoverSlider(${i},${j},this.value)"
            onchange="applyCoverPosition(${i},${j},this.value)">
        </div>
      </div>
    </div>`;
}

/**
 * updateMushroomCoverCard — syncs a rendered cover card to a HA cover state object.
 * Updates the on class (open = on), position label, fill bar, and slider value.
 */
function updateMushroomCoverCard(i, j, isOn, d) {
  const card = document.getElementById(`sub-${i}-${j}`);
  if (!card) return;
  card.classList.toggle("on", isOn);

  const attrs  = (d && d.attributes) || {};
  const pos    = attrs.current_position ?? (isOn ? 100 : 0);
  const posEl  = document.getElementById(`coverpos-${i}-${j}`);
  const fillEl = document.getElementById(`coverfill-${i}-${j}`);
  const slEl   = document.getElementById(`coverslider-${i}-${j}`);

  if (posEl)  posEl.textContent  = isOn ? pos + "% open" : "Closed";
  if (fillEl) fillEl.style.width = pos + "%";
  if (slEl)   slEl.value         = pos;
}

/**
 * onCoverSlider — live-updates the fill bar and position label as the slider is dragged.
 */
function onCoverSlider(i, j, val) {
  const fillEl = document.getElementById(`coverfill-${i}-${j}`);
  const posEl  = document.getElementById(`coverpos-${i}-${j}`);
  if (fillEl) fillEl.style.width = val + "%";
  if (posEl)  posEl.textContent  = val + "% open";
}

/**
 * applyCoverPosition — sends a set_cover_position command to HA when slider is released.
 */
async function applyCoverPosition(i, j, pct) {
  const s = (activeControls[i]._flatSubs || activeControls[i].subEntities)[j];
  if (!s) return;
  const card = document.getElementById(`sub-${i}-${j}`);
  if (card) card.classList.toggle("on", parseInt(pct) > 0);
  await haService("cover", "set_cover_position", { entity_id: s.entity, position: parseInt(pct) });
}

/**
 * coverCommand — sends open_cover, close_cover, or stop_cover to HA
 * and updates the card state immediately for responsiveness.
 */
async function coverCommand(i, j, service) {
  const s = (activeControls[i]._flatSubs || activeControls[i].subEntities)[j];
  if (!s) return;
  const card   = document.getElementById(`sub-${i}-${j}`);
  const fillEl = document.getElementById(`coverfill-${i}-${j}`);
  const posEl  = document.getElementById(`coverpos-${i}-${j}`);
  const slEl   = document.getElementById(`coverslider-${i}-${j}`);
  if (service === "open_cover") {
    if (card)   card.classList.add("on");
    if (fillEl) fillEl.style.width = "100%";
    if (posEl)  posEl.textContent  = "100% open";
    if (slEl)   slEl.value         = 100;
  } else if (service === "close_cover") {
    if (card)   card.classList.remove("on");
    if (fillEl) fillEl.style.width = "0%";
    if (posEl)  posEl.textContent  = "Closed";
    if (slEl)   slEl.value         = 0;
  }
  await haService("cover", service, { entity_id: s.entity });
}

/**
 * buildMushroomCard — renders the HTML for a single light control card
 * inside the popup, with a brightness slider and colour/temp panels.
 * @param {number} i            — control index (parent chip)
 * @param {number} j            — sub-entity index within the control
 * @param {Object} s            — sub-entity object {label, entity}
 * @param {Array}  COLOR_PRESETS — colour swatch definitions
 * @param {Array}  TEMP_PRESETS  — white temperature button definitions
 */
function buildMushroomCard(i, j, s, COLOR_PRESETS, TEMP_PRESETS) {
  const swatches = COLOR_PRESETS.map((p, k) =>
    `<div class="mush-swatch" id="sw-${i}-${j}-${k}" title="${p.label}"
      style="background:rgb(${p.rgb.join(',')})"
      onclick="event.stopPropagation();applyLightColor(${i},${j},${JSON.stringify(p.rgb)},${k})"></div>`
  ).join('');
  const tempBtns = TEMP_PRESETS.map((p, k) =>
    `<button class="mush-temp-btn" id="tb-${i}-${j}-${k}"
      onclick="event.stopPropagation();applyLightTemp(${i},${j},${p.mireds},${k})">${p.label}</button>`
  ).join('');
  return `
    <div class="mush-light-card" id="sub-${i}-${j}">
      <div class="mush-light-top">
        <div class="mush-bulb-icon" onclick="toggleSubEntity(event,${i},${j})">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21h6M12 3a6 6 0 0 1 6 6c0 2.2-1.2 4.1-3 5.2V17H9v-2.8A6 6 0 0 1 6 9a6 6 0 0 1 6-6z"/>
          </svg>
        </div>
        <div class="mush-light-meta">
          <div class="mush-light-name">${escapeHtml(s.label)}</div>
          <div class="mush-light-pct" id="pct-${i}-${j}">—</div>
        </div>
      </div>
      <div class="mush-slider-row">
        <div class="mush-brightness-track" id="track-${i}-${j}">
          <div class="mush-brightness-fill" id="fill-${i}-${j}" style="width:0%"></div>
          <input type="range" class="mush-brightness-input" id="bslider-${i}-${j}"
            min="1" max="100" value="100"
            oninput="onMushroomSlider(${i},${j},this.value)"
            onchange="applyLightBrightness(${i},${j},this.value)">
        </div>
        <div class="mush-icon-btn" id="temp-btn-icon-${i}-${j}" title="White temperature"
          onclick="event.stopPropagation();toggleMushroomPanel(${i},${j},'temp')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linecap="round">
            <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>
          </svg>
        </div>
        <div class="mush-icon-btn" id="color-btn-icon-${i}-${j}" title="Colour"
          onclick="event.stopPropagation();toggleMushroomPanel(${i},${j},'color')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="13.5" cy="6.5" r="1.5"/><circle cx="17.5" cy="10.5" r="1.5"/>
            <circle cx="8.5" cy="7.5" r="1.5"/><circle cx="6.5" cy="12.5" r="1.5"/>
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10c1.38 0 2.5-1.12 2.5-2.5 0-.61-.23-1.17-.6-1.6-.36-.42-.58-.97-.58-1.4 0-1.38 1.12-2.5 2.5-2.5H18c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8z"/>
          </svg>
        </div>
      </div>
      <div class="mush-color-panel" id="temp-panel-${i}-${j}">
        <div class="mush-panel-section-label">White Temperature</div>
        <div class="mush-temp-btns">${tempBtns}</div>
      </div>
      <div class="mush-color-panel" id="color-panel-${i}-${j}">
        <div class="mush-panel-section-label">Colour</div>
        <div class="mush-swatches">${swatches}</div>
      </div>
    </div>`;
}

/**
 * updateMushroomCard — syncs a rendered mushroom card to a HA state object.
 * Updates on/off class, brightness percentage label, and slider position.
 * @param {number}  i    — control index
 * @param {number}  j    — sub-entity index
 * @param {boolean} isOn — whether the light is currently on
 * @param {Object}  d    — the HA state object (may be null)
 */
function updateMushroomCard(i, j, isOn, d) {
  const card = document.getElementById(`sub-${i}-${j}`);
  if (!card) return;
  card.classList.toggle("on", isOn);
  const pct = (isOn && d.attributes && d.attributes.brightness != null)
    ? Math.round(d.attributes.brightness / 255 * 100) : 0;
  const pctEl = document.getElementById(`pct-${i}-${j}`);
  if (pctEl) pctEl.textContent = isOn ? pct + "%" : "Off";
  const sl = document.getElementById(`bslider-${i}-${j}`);
  const fill = document.getElementById(`fill-${i}-${j}`);
  if (sl) sl.value = isOn ? pct : 0;
  if (fill) fill.style.width = (isOn ? pct : 0) + "%";
}

/**
 * onMushroomSlider — live-updates the brightness fill bar and percentage
 * label as the slider is dragged, before the final value is sent to HA.
 * @param {number} i   — control index
 * @param {number} j   — sub-entity index
 * @param {string} val — current slider value (0–100)
 */
function onMushroomSlider(i, j, val) {
  const fill = document.getElementById(`fill-${i}-${j}`);
  const pctEl = document.getElementById(`pct-${i}-${j}`);
  if (fill) fill.style.width = val + "%";
  if (pctEl) pctEl.textContent = val + "%";
}

/**
 * toggleMushroomPanel — shows/hides the colour or temperature panel
 * inside a mushroom card. Only one panel can be open at a time.
 * @param {number} i    — control index
 * @param {number} j    — sub-entity index
 * @param {string} type — "temp" or "color"
 */
function toggleMushroomPanel(i, j, type) {
  const tempPanel  = document.getElementById(`temp-panel-${i}-${j}`);
  const colorPanel = document.getElementById(`color-panel-${i}-${j}`);
  const tempBtn    = document.getElementById(`temp-btn-icon-${i}-${j}`);
  const colorBtn   = document.getElementById(`color-btn-icon-${i}-${j}`);
  const card = document.getElementById(`sub-${i}-${j}`);
  if (!card || !card.classList.contains("on")) return; // only when light is on

  if (type === 'temp') {
    const wasOpen = tempPanel.classList.contains("open");
    tempPanel.classList.toggle("open", !wasOpen);
    colorPanel.classList.remove("open");
    tempBtn.classList.toggle("active", !wasOpen);
    colorBtn.classList.remove("active");
  } else {
    const wasOpen = colorPanel.classList.contains("open");
    colorPanel.classList.toggle("open", !wasOpen);
    tempPanel.classList.remove("open");
    colorBtn.classList.toggle("active", !wasOpen);
    tempBtn.classList.remove("active");
  }
}

/**
 * applyLightBrightness — sends a brightness command to HA when the
 * slider is released. Converts 0–100% to the 0–255 HA range.
 */
async function applyLightBrightness(i, j, pct) {
  const c = activeControls[i];
  const s = (c._flatSubs || c.subEntities)[j];
  if (!s) return;
  const card = document.getElementById(`sub-${i}-${j}`);
  // Turn on if not already
  if (card && !card.classList.contains("on")) {
    card.classList.add("on");
  }
  const brightness = Math.round(pct / 100 * 255);
  await haService("light", "turn_on", { entity_id: s.entity, brightness });
}

/**
 * applyLightColor — sends an RGB colour command to HA and highlights
 * the selected colour swatch.
 */
async function applyLightColor(i, j, rgb, swatchIdx) {
  const c = activeControls[i];
  const s = (c._flatSubs || c.subEntities)[j];
  if (!s) return;
  // Clear all swatches in this card, activate the clicked one
  document.querySelectorAll(`[id^="sw-${i}-${j}-"]`).forEach(el => el.classList.remove("active"));
  document.querySelectorAll(`[id^="tb-${i}-${j}-"]`).forEach(el => el.classList.remove("active"));
  const sw = document.getElementById(`sw-${i}-${j}-${swatchIdx}`);
  if (sw) sw.classList.add("active");
  const brightness = Math.round((document.getElementById(`bslider-${i}-${j}`)?.value || 100) / 100 * 255);
  await haService("light", "turn_on", { entity_id: s.entity, rgb_color: rgb, brightness });
}

/**
 * applyLightTemp — sends a colour temperature command to HA.
 * Converts mireds to Kelvin (K = 1,000,000 / mireds).
 */
async function applyLightTemp(i, j, mireds, btnIdx) {
  const c = activeControls[i];
  const s = (c._flatSubs || c.subEntities)[j];
  if (!s) return;
  document.querySelectorAll(`[id^="sw-${i}-${j}-"]`).forEach(el => el.classList.remove("active"));
  document.querySelectorAll(`[id^="tb-${i}-${j}-"]`).forEach(el => el.classList.remove("active"));
  const btn = document.getElementById(`tb-${i}-${j}-${btnIdx}`);
  if (btn) btn.classList.add("active");
  const brightness = Math.round((document.getElementById(`bslider-${i}-${j}`)?.value || 100) / 100 * 255);
  const kelvin = Math.round(1000000 / mireds);
  await haService("light", "turn_on", { entity_id: s.entity, color_temp_kelvin: kelvin, brightness });
}

/**
 * toggleSubEntity — toggles a single sub-entity on/off from inside
 * the popup. Handles lights, switches, fans, and covers.
 * @param {Event}  e — the click event (stopped from bubbling)
 * @param {number} i — control index
 * @param {number} j — sub-entity index
 */
async function toggleSubEntity(e, i, j) {
  e.stopPropagation();
  haptic("medium");
  const c = activeControls[i];
  const s = (c._flatSubs || c.subEntities)[j];
  const el = document.getElementById(`sub-${i}-${j}`);
  if (!el) return;
  const isOn = el.classList.contains("on");
  const domain = s.entity.split(".")[0];
  let service;

  if (domain === "cover") {
    // Covers use open/close services — not turn_on/off
    service = isOn ? "close_cover" : "open_cover";
  } else if (domain === "climate") {
    // Climate entities are handled entirely by toggleAcPower() — this branch
    // should not be reached, but guard just in case.
    toggleAcPower(i, j);
    return;
  } else if (domain === "fan") {
    // Fan/purifier entities are handled entirely by togglePurifierPower()
    togglePurifierPower(i, j);
    return;
  } else {
    service = isOn ? "turn_off" : "turn_on";
  }
  el.classList.toggle("on", !isOn);
  // Update mushroom card pct label if applicable
  const pctEl = document.getElementById(`pct-${i}-${j}`);
  if (pctEl) pctEl.textContent = isOn ? "Off" : "100%";
  const fill = document.getElementById(`fill-${i}-${j}`);
  const sl = document.getElementById(`bslider-${i}-${j}`);
  if (fill) fill.style.width = isOn ? "0%" : "100%";
  if (sl) sl.value = isOn ? 0 : 100;
  // Update switch card status text if applicable
  const swStatusEl = document.getElementById(`swstatus-${i}-${j}`);
  if (swStatusEl) swStatusEl.textContent = isOn ? "Off" : "On";
  // Close colour panels when turning off
  if (isOn) {
    document.getElementById(`temp-panel-${i}-${j}`)?.classList.remove("open");
    document.getElementById(`color-panel-${i}-${j}`)?.classList.remove("open");
    document.getElementById(`temp-btn-icon-${i}-${j}`)?.classList.remove("active");
    document.getElementById(`color-btn-icon-${i}-${j}`)?.classList.remove("active");
  }
  // Refresh the room accordion badge immediately
  if (_openAccordionRoomId) {
    const badge = document.getElementById(`room-badge-${_openAccordionRoomId}`);
    const panel = document.getElementById(`room-panel-${_openAccordionRoomId}`);
    if (badge && panel) {
      const onCount = panel.querySelectorAll(".popup-item.on, .mush-light-card.on, .mush-cover-card.on, .mush-ac-card.on, .mush-purifier-card.on").length;
      badge.textContent = onCount > 0 ? onCount + " on" : "";
      badge.classList.toggle("visible", onCount > 0);
    }
  }
  await haCall(domain, service, s.entity);
}


// Tracks which room accordion is currently open — avoids querySelectorAll scans
let _openAccordionRoomId = null;

/**
 * toggleRoomAccordion — expands or collapses a room panel inside the overview
 * popup. Only one room can be open at a time; opening a new one collapses the
 * previous immediately via direct ID reference (no DOM scan).
 *
 * @param {string} roomId   — the group label used as a stable DOM id
 * @param {number} ctrlIdx  — index into activeControls (the chip that was tapped)
 * @param {number} startIdx — start index of this room's entities in c._flatSubs
 * @param {number} count    — how many entities this room has
 *
 * Performance notes:
 *  - Cards are built lazily (only on first open) and reused on re-open.
 *  - State is read from the in-memory cache first; a network fetch is only
 *    triggered when an entity is genuinely missing from cache (cold start).
 *  - The panel opens and cards render synchronously; state hydration happens
 *    async so the expansion animation is never blocked.
 */
async function toggleRoomAccordion(roomId, ctrlIdx, startIdx, count) {
  haptic("light");
  const c     = activeControls[ctrlIdx];
  const row   = document.getElementById(`room-row-${roomId}`);
  const panel = document.getElementById(`room-panel-${roomId}`);
  if (!row || !panel) return;

  const isOpen = _openAccordionRoomId === roomId;

  // Close the previously open room (direct reference — no DOM scan)
  if (_openAccordionRoomId && _openAccordionRoomId !== roomId) {
    document.getElementById(`room-row-${_openAccordionRoomId}`)?.classList.remove("open");
    document.getElementById(`room-panel-${_openAccordionRoomId}`)?.classList.remove("open");
  }

  if (isOpen) {
    // Collapse this room
    row.classList.remove("open");
    panel.classList.remove("open");
    _openAccordionRoomId = null;
    // Shrink popup back to compact room-list width
    document.querySelector("#popup-overlay .popup")?.classList.remove("popup--expanded");
    return;
  }

  // Open this room
  row.classList.add("open");
  panel.classList.add("open");
  _openAccordionRoomId = roomId;
  // Grow popup to full width so light cards and brightness sliders have room
  document.querySelector("#popup-overlay .popup")?.classList.add("popup--expanded");

  const isLightControl   = c._isLight;
  const isClimateControl = c._isClimate;
  const isCoverControl   = c._isCover;
  const isPurifierControl = c._isPurifier;
  const COLOR_PRESETS    = c._colorPresets;
  const TEMP_PRESETS     = c._tempPresets;

  // ── Build card HTML once, reuse on subsequent opens ──────────────────────
  if (!panel.dataset.built) {
    panel.dataset.built = "1";
    const parts = [];
    for (let k = 0; k < count; k++) {
      const j = startIdx + k;
      const s = c._flatSubs[j];
      if (isLightControl)        parts.push(buildMushroomCard(ctrlIdx, j, s, COLOR_PRESETS, TEMP_PRESETS));
      else if (isClimateControl) parts.push(buildMushroomAcCard(ctrlIdx, j, s));
      else if (isCoverControl)   parts.push(buildMushroomCoverCard(ctrlIdx, j, s));
      else if (isPurifierControl) parts.push(buildMushroomPurifierCard(ctrlIdx, j, s));
      else {
        const domain = s.entity ? s.entity.split(".")[0] : "";
        if (domain === "switch" || domain === "input_boolean" || domain === "fan")
          parts.push(buildMushroomSwitchCard(ctrlIdx, j, s));
        else
          parts.push(`<div class="popup-item" id="sub-${ctrlIdx}-${j}" onclick="toggleSubEntity(event,${ctrlIdx},${j})">
            <span class="popup-item-label">${escapeHtml(s.label)}</span><div class="popup-toggle"></div></div>`);
      }
    }
    if (isLightControl) {
      panel.classList.add("light-grid");
      panel.innerHTML = parts.join("");
    } else {
      panel.innerHTML = parts.join("");
    }
  }

  // ── Hydrate cards with the best available state ────────────────────────
  // For climate entities we use _acCardState (in-memory, written on every
  // user interaction) as the primary source of truth so the card always
  // reflects the last action the user took — even before HA confirms it.
  // For all other entity types we read from the HA state cache and fall
  // back to a live fetch when an entity is missing.
  const subs = c._flatSubs.slice(startIdx, startIdx + count);

  function hydrateCards(states) {
    let activeCount = 0;
    states.forEach((d, k) => {
      const j   = startIdx + k;
      const sub = subs[k];

      if (isClimateControl) {
        // Prefer in-memory card state; fall back to HA state object
        const mem = _acCardState.get(sub.entity);
        if (mem) {
          // Re-apply from memory — no network needed
          updateMushroomAcCard(ctrlIdx, j, mem.isOn, {
            entity_id: sub.entity,
            state: mem.isOn ? mem.mode : "off",
            attributes: {
              hvac_mode: mem.isOn ? mem.mode : "off",
              fan_mode: mem.fanMode,
              temperature: mem.targetTemp,
            }
          });
          if (mem.isOn) activeCount++;
        } else if (d) {
          const state = d.state;
          const isOn  = state !== "off" && state !== "unavailable" && state !== "unknown" && state !== "";
          if (isOn) activeCount++;
          updateMushroomAcCard(ctrlIdx, j, isOn, d);
        }
      } else {
        const state = d ? d.state : "unknown";
        let isOn;
        if (isCoverControl) isOn = ["open","opening"].includes(state);
        else                isOn = !!d && !["off","closed","unavailable","unknown"].includes(state);
        if (isOn) activeCount++;

        if (isLightControl)      updateMushroomCard(ctrlIdx, j, isOn, d);
        else if (isCoverControl) updateMushroomCoverCard(ctrlIdx, j, isOn, d);
        else if (isPurifierControl) {
          // Prefer in-memory card state so the percentage is correct even
          // before the user has interacted (matches the AC card pattern).
          const mem = _purifierCardState.get(sub.entity);
          if (mem) {
            updateMushroomPurifierCard(ctrlIdx, j, mem.isOn, {
              entity_id: sub.entity,
              state: mem.isOn ? "on" : "off",
              attributes: { percentage: mem.pct }
            });
          } else {
            updateMushroomPurifierCard(ctrlIdx, j, isOn, d);
          }
        }
        else {
          const domain = sub.entity ? sub.entity.split(".")[0] : "";
          if (domain === "switch" || domain === "input_boolean" || domain === "fan")
            updateMushroomSwitchCard(ctrlIdx, j, isOn);
          else
            document.getElementById(`sub-${ctrlIdx}-${j}`)?.classList.toggle("on", isOn);
        }
      }
    });

    const badge = document.getElementById(`room-badge-${roomId}`);
    if (badge) {
      badge.textContent = activeCount > 0 ? activeCount + " on" : "";
      badge.classList.toggle("visible", activeCount > 0);
    }
  }

  // Pass 1: instant render using _acCardState (climate) or HA cache (others)
  const cachedStates = subs.map(s => haGetCached(s.entity));
  hydrateCards(cachedStates);

  // Pass 2: fetch live state from HA for any entity NOT already in _acCardState
  // (first-ever open before the user has interacted). Climate entities that
  // already have in-memory state skip the network entirely.
  const needsFetch = subs.some((s, k) => {
    if (isClimateControl  && _acCardState.has(s.entity))       return false;
    if (isPurifierControl && _purifierCardState.has(s.entity)) return false;
    return !cachedStates[k];
  });
  if (needsFetch) {
    const freshStates = await Promise.all(subs.map(s => haGet(s.entity)));
    hydrateCards(freshStates);
  }
}

/* ─── CALENDAR LOGIC (Limit to 5 Events) ─── */
/**
 * openCalendar — fetches events from all configured calendar entities,
 * merges and sorts them, and displays the next 5 in the calendar popup.
 */
async function openCalendar() {
  haptic("light");
  const overlay = document.getElementById("calendar-overlay");
  const list = document.getElementById("calendar-list");
  overlay.classList.add("open");
  list.innerHTML = '<div style="text-align:center;font-size:9px;letter-spacing:0.25em;color:rgba(255,255,255,0.6);text-transform:uppercase;">Loading schedules...</div>';
  try {
    const start = new Date().toISOString();
    const end = new Date(Date.now() + 86400000 * 30).toISOString();
    const requests = CONFIG.calendarEntities.map(entity => 
      fetch(`${BASE}/api/calendars/${entity}?start=${start}&end=${end}`, {
        headers: { Authorization: `Bearer ${HA_TOKEN}` }
      }).then(r => r.json().catch(() => []))
    );
    const results = await Promise.all(requests);
    const allEvents = results.flat()
      .sort((a, b) => new Date(a.start.dateTime || a.start.date) - new Date(b.start.dateTime || b.start.date))
      .slice(0, 5); // Limit to next 5 events
    if (allEvents.length === 0) {
      list.innerHTML = '<div style="text-align:center;font-size:9px;letter-spacing:0.25em;color:rgba(255,255,255,0.6);text-transform:uppercase;">No upcoming events</div>';
      return;
    }
    list.innerHTML = allEvents.map(event => {
      const date = new Date(event.start.dateTime || event.start.date);
      const dayStr = date.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
      const timeStr = event.start.dateTime ? date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "All Day";
      return `<div class="event-item"><div class="event-time">${escapeHtml(dayStr)} • ${escapeHtml(timeStr)}</div><div class="event-summary">${escapeHtml(event.summary)}</div></div>`;
    }).join('');
  } catch (e) { list.innerHTML = '<div style="text-align:center;font-size:9px;letter-spacing:0.25em;color:#ff6b6b;text-transform:uppercase;">Failed to load calendars</div>'; }
}

/**
 * getRelativeTime — converts a HA timestamp string into a human-readable
 * relative time string (e.g. "Last used 3h ago").
 * @param {string} timestamp — ISO date string from HA
 * @returns {string}
 */
function getRelativeTime(timestamp) {
  if (!timestamp || timestamp === "—" || timestamp === "unknown") return "—";
  
  const now = new Date();
  const then = new Date(timestamp);
  const diffInSeconds = Math.floor((now - then) / 1000);
  
  if (isNaN(diffInSeconds)) return timestamp;

  if (diffInSeconds < 60) return "Just now";
  
  const diffInMinutes = Math.floor(diffInSeconds / 60);
  if (diffInMinutes < 60) return `Last used ${diffInMinutes}m ago`;
  
  const diffInHours = Math.floor(diffInMinutes / 60);
  if (diffInHours < 24) return `Last used ${diffInHours}h ago`;
  
  return `Last used ${Math.floor(diffInHours / 24)}d ago`;
}

/**
 * fetchLitterHistory — queries the HA history API for the litter-box sensor
 * over the past 5 days and returns an array of { date, value } objects,
 * one per day (oldest → newest). Uses the daily max, matching the HA
 * apexcharts-card config (group_by: func: max, duration: 1d).
 */
async function fetchLitterHistory() {
  const entity = CONFIG.petStats.litterCount;
  if (!entity || !HA_TOKEN) return null;

  // Build a start timestamp 5 full days ago at midnight local time
  const now   = new Date();
  const start = new Date(now);
  start.setDate(start.getDate() - 4);
  start.setHours(0, 0, 0, 0);

  try {
    const r = await fetch(
      `${BASE}/api/history/period/${start.toISOString()}?filter_entity_id=${entity}&end_time=${now.toISOString()}&minimal_response`,
      { headers: { Authorization: `Bearer ${HA_TOKEN}` } }
    );
    if (!r.ok) return null;
    const raw = await r.json();  // [ [ {state, last_changed, ...}, ... ] ]
    if (!raw || !raw[0]) return null;

    // Group states by calendar day and take the max value per day
    const byDay = {};
    for (const entry of raw[0]) {
      const val = parseFloat(entry.state);
      if (isNaN(val)) continue;
      const day = entry.last_changed.slice(0, 10); // "YYYY-MM-DD"
      byDay[day] = Math.max(byDay[day] ?? 0, val);
    }

    // Build the last 5 calendar days in order (fill missing days with 0)
    const days = [];
    for (let i = 4; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      const key   = d.toISOString().slice(0, 10);
      const label = `${d.getDate()} ${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()]}`;
      days.push({ date: key, label, value: byDay[key] ?? 0 });
    }
    return days;
  } catch { return null; }
}

/**
 * renderLitterChart — populates the 5-bar litter chart in YOUR_PET_NAME's popup.
 * Bar colour mirrors the HA apexcharts config:
 *   0–5  → green   (#22a722)
 *   6–10 → orange  (#f59e0b)
 *   11+  → red     (#ef4444)
 */
function renderLitterChart(days) {
  if (!days) return;
  const maxVal = Math.max(...days.map(d => d.value), 1); // avoid /0
  const BAR_MAX_PX = 56; // matches .litter-bar-wrap height

  days.forEach((day, i) => {
    const barEl  = document.getElementById(`lbc-b${i}`);
    const valEl  = document.getElementById(`lbc-v${i}`);
    const lblEl  = document.getElementById(`lbc-l${i}`);
    if (!barEl || !valEl || !lblEl) return;

    const heightPx = day.value === 0 ? 3 : Math.max(4, Math.round((day.value / maxVal) * BAR_MAX_PX));
    const color    = day.value <= 5  ? "#22a722"
                   : day.value <= 10 ? "#f59e0b"
                   :                   "#ef4444";

    barEl.style.height     = heightPx + "px";
    barEl.style.background = color;
    valEl.textContent      = day.value > 0 ? day.value : "";
    lblEl.textContent      = day.label;
  });
}

/**
 * measureBottomArea — reads the actual rendered height of the bottom area
 * and hero content, storing them as CSS custom properties so other elements
 * (like the music bar) can position themselves correctly.
 * Called on load and on every resize.
 */
function measureBottomArea() {
  const el = document.querySelector(".bottom-area");
  if (el) document.documentElement.style.setProperty("--bottom-area-h", el.offsetHeight + "px");
  const hc = document.querySelector(".hero-content");
  if (hc) document.documentElement.style.setProperty("--hero-content-h", hc.offsetHeight + "px");
