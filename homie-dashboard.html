<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════════════╗
  ║                        HOMIE  DASHBOARD                                  ║
  ╠══════════════════════════════════════════════════════════════════════════╣
  ║  A custom Home Assistant dashboard designed for wall-mounted tablets.    ║
  ║                                                                          ║    
  ║  CUSTOMISATION                                                           ║
  ║  All configuration (rooms, sensors, controls, scenes) is in the          ║
  ║  CONFIG object at the top of the <script> section.                       ║
  ║                                                                          ║
  ║  Search for "YOUR_" to find every value you need to personalise          ║   
  ║                                                                          ║
  ║  Each section has comments explaining the available options.             ║
  ╚══════════════════════════════════════════════════════════════════════════╝
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="mobile-web-app-capable" content="yes">
<title>Homie Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ─── THEME VARIABLES ─── */
  :root {
    --accent:      #b8965c;
    --accent-hi:   #d4ae78;
    --accent-glow: rgba(184,150,92,0.2);
    /* accent opacity variants */
    --ac-05:  rgba(184,150,92,0.05);
    --ac-06:  rgba(184,150,92,0.06);
    --ac-08:  rgba(184,150,92,0.08);
    --ac-1:   rgba(184,150,92,0.1);
    --ac-12:  rgba(184,150,92,0.12);
    --ac-15:  rgba(184,150,92,0.15);
    --ac-18:  rgba(184,150,92,0.18);
    --ac-2:   rgba(184,150,92,0.2);
    --ac-25:  rgba(184,150,92,0.25);
    --ac-3:   rgba(184,150,92,0.3);
    --ac-35:  rgba(184,150,92,0.35);
    --ac-4:   rgba(184,150,92,0.4);
    --ac-45:  rgba(184,150,92,0.45);
    --ac-5:   rgba(184,150,92,0.5);
    --ac-55:  rgba(184,150,92,0.55);
    --ac-6:   rgba(184,150,92,0.6);
    --ac-7:   rgba(184,150,92,0.7);
    --ac-85:  rgba(184,150,92,0.85);
    /* accent-hi opacity variants */
    --hi-18:  rgba(212,174,120,0.18);
    --hi-2:   rgba(212,174,120,0.2);
    --hi-25:  rgba(212,174,120,0.25);
    --hi-5:   rgba(212,174,120,0.5);
    --hi-55:  rgba(212,174,120,0.55);
    --hi-7:   rgba(212,174,120,0.7);
    --hi-75:  rgba(212,174,120,0.75);
    --hi-8:   rgba(212,174,120,0.8);
    --hi-85:  rgba(212,174,120,0.85);
  }

  html, body {
    width: 100%; height: 100%;
    background: #0d0d0d;
    font-family: 'Montserrat', sans-serif;
    color: #fff;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }

  /* ─── TOP BAR ─── */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 2rem;
    pointer-events: none;
    background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%);
  }

  .top-left {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .brand {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--accent);
  }
  .top-clock {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--accent);
    line-height: 1;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
  }
  .top-date {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-top: 6px;
    font-weight: 400;
  }

  /* ─── WEATHER WIDGET (top-centre) ─── */
  .top-center {
    position: absolute;
    left: 50%;
    top: 1rem;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    pointer-events: none;
  }
  .weather-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .weather-temp {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 300;
    color: #fff;
    letter-spacing: 0.1em;
  }
  .weather-desc {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.85);
    text-transform: uppercase;
  }

  .top-right {
    display: flex;
    align-items: center;
    gap: 8px;
    pointer-events: all;
  }
  .topbar-btn {
    background: transparent;
    color: #fff;
    border: 1px solid var(--ac-5);
    padding: 7px 20px;
    font-size: 9px;
    letter-spacing: 0.25em;
    cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    border-radius: 2px;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  .topbar-btn:hover {
    background: var(--ac-15);
    border-color: var(--accent-hi);
    color: var(--accent-hi);
  }

  /* ─── CAT STATS GRID (inside popup overlay) ─── */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 10px;
  }
  /* ─── LITTER CHART ─── */
  .litter-chart-section {
    margin-top: 14px;
    background: #111;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 14px 10px;
  }
  .litter-chart-title {
    font-size: 8px;
    letter-spacing: 0.28em;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    margin-bottom: 10px;
    text-align: center;
  }
  .litter-chart-bars {
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    gap: 6px;
    height: 80px;
  }
  .litter-bar-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex: 1;
  }
  .litter-bar-val {
    font-size: 9px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.05em;
    min-height: 12px;
  }
  .litter-bar-wrap {
    width: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    height: 56px;
  }
  .litter-bar {
    width: 70%;
    border-radius: 4px 4px 2px 2px;
    transition: height 0.4s ease;
    min-height: 3px;
  }
  .litter-bar-label {
    font-size: 8px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.1em;
    text-align: center;
  }
  .cat-card {
    background: #111;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 15px 10px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .cat-card-icon { display: flex; align-items: center; justify-content: center; margin-bottom: 5px; }
  .cat-card-text {
    font-size: 9px;
    line-height: 1.4;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.25em;
  }

  /* ─── HERO ─── */
  .hero {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    margin-bottom: 10vh;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    filter: brightness(0.2) grayscale(30%);
    opacity: 1;
  }
  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    background: radial-gradient(circle, rgba(0,0,0,0.5) 0%, transparent 80%);
    padding: 4rem;
    border-radius: 50%;
  }
  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 300;
    letter-spacing: 0.25em;
    margin-bottom: 2rem;
    line-height: 1;
    color: rgba(255,255,255,0.95);
    text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
  }

  .hero-stats {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0;
  }
  .stat {
    padding: 0.6rem 1.4rem;
    text-align: center;
    border-left: 1px solid var(--ac-4);
  }
  .stat:nth-child(5n+1) { border-left: none; }
  .stat:nth-child(n+6) {
    border-top: 1px solid var(--ac-4);
    padding-top: 0.8rem;
  }
  .stat-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,1); 
    text-transform: uppercase;
    margin-bottom: 5px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
  }
  .stat-value {
    font-size: 13px;
    color: #fff;
    font-weight: 400;
    letter-spacing: 0.05em;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
  }
  .stat-value.on  { color: var(--accent-hi); }
  .stat-value.off { color: rgba(255,255,255,0.7); }



  /* ─── BOTTOM AREA ─── */
  .bottom-area {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 40;
    background: linear-gradient(to top, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.8) 60%, transparent 100%);
    padding: 3rem 2rem 1.4rem;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .sensor-row {
    display: flex;
    align-items: stretch;
    gap: 0;
    border: 1px solid var(--ac-25);
    border-radius: 30px;
    padding: 0;
    background: rgba(0,0,0,0.4);
    overflow: hidden;
  }
  .floor-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 8px 18px 8px;
    flex: 1;
  }
  .floor-panel + .floor-panel {
    border-left: 1px solid var(--ac-35);
  }
  .floor-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--ac-85);
    text-transform: uppercase;
    font-weight: 500;
    line-height: 1;
  }
  .floor-readings {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .floor-reading {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .floor-reading-icon {
    display: flex;
    align-items: center;
    opacity: 0.7;
    flex-shrink: 0;
  }
  .floor-reading-val {
    font-size: 13px;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .floor-reading-sep {
    width: 1px;
    height: 10px;
    background: var(--ac-4);
    flex-shrink: 0;
  }
  /* ─── SOLAR PANEL ─── */
  .sensor-solar-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 5px;
    padding: 8px 18px;
    border-left: 1px solid var(--ac-35);
  }
  .sensor-solar-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--ac-85);
    text-transform: uppercase;
    font-weight: 500;
    line-height: 1;
  }
  .sensor-solar-readings {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sensor-solar-reading {
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .sensor-solar-reading-icon {
    display: flex;
    align-items: center;
    opacity: 0.75;
    flex-shrink: 0;
  }
  .sensor-solar-reading-val {
    font-size: 13px;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .sensor-solar-sep {
    width: 1px;
    height: 10px;
    background: var(--ac-4);
    flex-shrink: 0;
  }

  .controls-row {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
  }
  .chip {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: #fff;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    text-transform: uppercase;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
  }
  .chip:hover { background: rgba(255,255,255,0.1); }
  .chip.on {
    background: var(--accent-glow);
    border-color: var(--ac-6);
    color: var(--accent-hi);
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .chip.on .dot { background: var(--accent); }

  /* ─── POPUPS ─── */
  .popup-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .popup-overlay.open { opacity: 1; pointer-events: all; }
  .popup {
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 2rem;
    min-width: 200px;
    max-width: 650px;
    width: 90%;
    position: relative;
    transform: scale(0.95);
    transition: transform 0.25s ease, max-width 0.3s ease, width 0.3s ease;
  }
  .popup-overlay.open .popup { transform: scale(1); }
  /* Width overrides for specific popup types — avoids inline style attributes */
  .popup--calendar { max-width: 480px; }
  .popup--cat      { max-width: 550px; }
  /* Compact accordion: just the room list, no room expanded yet */
  .popup--compact {
    max-width: 300px;
    width: 300px;
  }
  /* Expanded accordion: a room is open, grow to full width for light cards */
  .popup--compact.popup--expanded {
    max-width: 650px;
    width: min(650px, 90vw);
  }
  /* Fixed-width size variants for flat-list popups */
  .popup--narrow {
    max-width: 400px;
    width: min(400px, 90vw);
  }
  .popup--scene {
    max-width: 500px;
    width: min(500px, 90vw);
  }
  .popup-title {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: #fff;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
    font-weight: 500;
  }
  .popup-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .popup-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .popup-item:hover { background: rgba(255,255,255,0.09); }
  .popup-item.on {
    background: var(--ac-12);
    border-color: var(--ac-4);
  }
  .popup-item-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: #fff;
    text-transform: uppercase;
  }
  .popup-toggle {
    width: 40px;
    height: 22px;
    border-radius: 11px;
    background: rgba(255,255,255,0.15);
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .popup-item.on .popup-toggle { background: var(--accent); }
  .popup-toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s;
  }
  .popup-item.on .popup-toggle::after { transform: translateX(18px); }

  /* ─── CHIP COUNT BADGE (e.g. "3 on" shown inside a chip) ─── */
  .chip-count {
    color: var(--accent-hi);
    font-size: 9px;
    letter-spacing: 0.25em;
    border-left: 1px solid var(--ac-35);
    padding-left: 8px;
    margin-left: 2px;
  }

  /* ─── POPUP GROUP LABELS (e.g. "Main Bath" / "Ensuite" separators) ─── */
  .popup-group-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: rgba(255,255,255,0.9);
    text-transform: uppercase;
    padding: 10px 4px 4px;
    margin-top: 4px;
    border-top: 1px solid var(--ac-45);
  }
  .popup-group-label:first-child {
    border-top: none;
    padding-top: 0;
    margin-top: 0;
  }

  /* ─── MUSHROOM-STYLE SWITCH CARDS ─── */
  /* Lean card for simple switch.* entities — icon circle + name/status + toggle.
   * Used in the Bath popup for Water Heater, HW Circulation zones, etc.       */
  .mush-switch-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
  }
  .mush-switch-card.on {
    border-color: var(--ac-45);
    background: var(--ac-06);
  }
  .mush-switch-top {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
  }
  .mush-switch-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .mush-switch-card.on .mush-switch-icon {
    background: var(--hi-2);
  }
  .mush-switch-icon svg { transition: stroke 0.2s; }
  .mush-switch-card.on .mush-switch-icon svg { stroke: var(--accent-hi); }
  .mush-switch-meta { flex: 1; min-width: 0; }
  .mush-switch-name {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: #fff;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mush-switch-status {
    font-size: 9px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.2em;
    margin-top: 2px;
    transition: color 0.2s;
  }
  .mush-switch-card.on .mush-switch-status { color: var(--hi-75); }
  /* The toggle knob reuses the same popup-toggle styles */
  /* Drive the popup-toggle knob and colour from the switch card's .on state */
  .mush-switch-card.on .popup-toggle { background: var(--accent); }
  .mush-switch-card.on .popup-toggle::after { transform: translateX(18px); }



  /* ─── SCENES CHIP POPUP ───
   * Scene bubbles rendered inside the popup for the overview Scenes chip.
   * Same visual style as the room-level scene bubbles but arranged in a
   * wrapped grid under a group label.                                        */
  .popup-scenes-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    padding: 8px 2px 12px;
  }
  .popup-scene-bubble {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }
  .popup-scene-icon {
    width: 52px; height: 52px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, opacity 0.15s;
    position: relative;
    overflow: hidden;
  }
  .popup-scene-icon:active { transform: scale(0.9); opacity: 0.8; }
  .popup-scene-icon.fired::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    animation: sceneFlash 0.6s ease-out forwards;
  }
  @keyframes sceneFlash {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }
  .popup-scene-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--hi-85);
    text-transform: uppercase;
    text-align: center;
  }

  /* ─── POPUP ROOM ACCORDION (overview two-level drill-down) ───
   * Level 1: a tappable room row showing name + active-count badge.
   * Level 2: the entity cards expand inline below the row when tapped.
   * Only one room can be expanded at a time.                               */
  .popup-room-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    user-select: none;
  }
  .popup-room-row:hover   { background: rgba(255,255,255,0.09); }
  .popup-room-row.open    {
    background: var(--ac-1);
    border-color: var(--ac-4);
    border-bottom-left-radius: 0;
    border-bottom-right-radius: 0;
  }
  .popup-room-row-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .popup-room-name {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: #fff;
    text-transform: uppercase;
  }
  .popup-room-badge {
    font-size: 9px;

  .popup-room-chevron {

  .popup-room-row.open .popup-room-chevron {

  /* The expanding panel that holds the entity cards for a room */
  .popup-room-panel {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    padding: 0 0 0;
    background: var(--ac-05);
    border: 1px solid var(--ac-4);

    border-bottom-right-radius: 10px;

    max-height: 1000px;
    opacity: 1;
    padding: 10px;
  }

  /* ─── 2-COLUMN GRID FOR FLAT POPUP LISTS (e.g. Irrigation) ─── */
  .popup-two-col-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  /* ─── 2-COLUMN GRID FOR LIGHT CARDS INSIDE ACCORDION PANEL ─── */
  .popup-room-panel.light-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    align-items: start;
  }

  /* ─── MUSHROOM-STYLE LIGHT CARDS ─── */
  .mush-light-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

    border-color: var(--ac-35);
  }
  .mush-light-top {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px 10px;
  }
  .mush-bulb-icon {
    width: 36px; height: 36px;
    border-radius: 50%;

    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
    cursor: pointer;
  }
  .mush-light-card.on .mush-bulb-icon {

  .mush-bulb-icon svg { transition: stroke 0.2s; }
  .mush-light-card.on .mush-bulb-icon svg { stroke: var(--accent-hi); }
  .mush-light-meta {
    flex: 1;
    min-width: 0;
  }
  .mush-light-name {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: #fff;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mush-light-pct {
    font-size: 9px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.25em;
    margin-top: 2px;
  }
  .mush-light-card.on .mush-light-pct { color: var(--hi-7); }
  .mush-icon-btn {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .mush-icon-btn:hover { background: rgba(255,255,255,0.13); }
  .mush-icon-btn.active {
    background: var(--accent-glow);
    border-color: var(--ac-5);
  }
  /* ─── MUSHROOM CARD — BRIGHTNESS SLIDER ─── */
  .mush-slider-row {
    padding: 0 14px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    max-height: 0;
    overflow: hidden;
    padding-top: 0;
    padding-bottom: 0;
    opacity: 0;
    transition: max-height 0.3s ease, opacity 0.25s ease, padding 0.3s ease;
  }
  .mush-light-card.on .mush-slider-row {
    max-height: 60px;
    padding: 0 14px 12px;
    opacity: 1;
  }

  .mush-brightness-track {
    flex: 1;
    height: 28px;
    border-radius: 14px;
    background: rgba(255,255,255,0.08);

    overflow: hidden;

  }
  .mush-brightness-fill {

  }
  .mush-brightness-input {
    position: absolute;
    inset: 0;

    height: 100%;
    opacity: 0;
    cursor: pointer;
    margin: 0;
  }
  /* ─── MUSHROOM CARD — COLOUR / TEMPERATURE PANEL ─── */
  .mush-color-panel {
    display: none;
    padding: 10px 14px 14px;
    border-top: 1px solid rgba(255,255,255,0.07);
    flex-direction: column;
    gap: 10px;
  }
  .mush-color-panel.open { display: flex; }
  .mush-panel-section-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .mush-swatches {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
  }
  .mush-swatch {
    width: 24px; height: 24px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.12s, border-color 0.12s;

  }
  .mush-swatch:hover { transform: scale(1.18); }
  .mush-swatch.active { border-color: #fff; transform: scale(1.15); }
  .mush-temp-btns {
    display: flex;
    gap: 6px;
  }
  .mush-temp-btn {
    flex: 1;
    padding: 5px 0;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    transition: all 0.15s;
  }
  .mush-temp-btn:hover { background: rgba(255,255,255,0.1); }
  .mush-temp-btn.active {
    background: var(--accent-glow);
    border-color: var(--ac-55);
    color: var(--accent-hi);
  }


  /* ─── MUSHROOM-STYLE AC CARDS ─────────────────────────────────────────────
   * Border, icon, status and active-button colour all change with HVAC mode:
   *   cool     → blue   fan_only → teal   heat → red/orange   dry → amber  */
  .mush-ac-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.3s, background 0.3s;
  }

  /* ── cool (default on) ── */
  .mush-ac-card.mode-cool  { border-color: rgba(92,160,184,0.4); }
  .mush-ac-card.mode-cool  .mush-ac-icon  { background: rgba(92,160,184,0.2); }
  .mush-ac-card.mode-cool  .mush-ac-icon svg { stroke: #7cc8e0; }
  .mush-ac-card.mode-cool  .mush-ac-status   { color: rgba(124,200,224,0.85); }
  .mush-ac-card.mode-cool  .mush-ac-btn.active {
    background: rgba(92,160,184,0.2); border-color: rgba(92,160,184,0.55); color: #7cc8e0;
  }

  /* ── heat ── */
  .mush-ac-card.mode-heat  { border-color: rgba(220,90,60,0.45); }
  .mush-ac-card.mode-heat  .mush-ac-icon  { background: rgba(220,90,60,0.2); }
  .mush-ac-card.mode-heat  .mush-ac-icon svg { stroke: #f07050; }
  .mush-ac-card.mode-heat  .mush-ac-status   { color: rgba(240,112,80,0.85); }
  .mush-ac-card.mode-heat  .mush-ac-btn.active {
    background: rgba(220,90,60,0.2); border-color: rgba(220,90,60,0.55); color: #f07050;
  }

  /* ── fan only ── */
  .mush-ac-card.mode-fan   { border-color: rgba(80,190,160,0.45); }
  .mush-ac-card.mode-fan   .mush-ac-icon  { background: rgba(80,190,160,0.2); }
  .mush-ac-card.mode-fan   .mush-ac-icon svg { stroke: #50c8a8; }
  .mush-ac-card.mode-fan   .mush-ac-status   { color: rgba(80,200,168,0.85); }
  .mush-ac-card.mode-fan   .mush-ac-btn.active {
    background: rgba(80,190,160,0.2); border-color: rgba(80,190,160,0.55); color: #50c8a8;
  }

  /* ── dry ── */
  .mush-ac-card.mode-dry   { border-color: rgba(200,165,60,0.45); }
  .mush-ac-card.mode-dry   .mush-ac-icon  { background: rgba(200,165,60,0.2); }
  .mush-ac-card.mode-dry   .mush-ac-icon svg { stroke: #d4ae50; }
  .mush-ac-card.mode-dry   .mush-ac-status   { color: rgba(212,174,80,0.85); }
  .mush-ac-card.mode-dry   .mush-ac-btn.active {
    background: rgba(200,165,60,0.2); border-color: rgba(200,165,60,0.55); color: #d4ae50;
  }

  .mush-ac-top {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px 10px;
  }
  .mush-ac-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.3s;
    cursor: pointer;
  }
  .mush-ac-icon svg { transition: stroke 0.3s; }
  .mush-ac-meta { flex: 1; min-width: 0; }
  .mush-ac-name {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: #fff;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mush-ac-status {
    font-size: 9px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.25em;
    margin-top: 2px;
    text-transform: uppercase;
    transition: color 0.3s;
  }

  /* Controls panel — hidden until unit is on (smooth slide reveal) */
  .mush-ac-controls {
    padding: 0 14px;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.3s ease;
  }
  .mush-ac-card.on .mush-ac-controls {
    max-height: 200px;
    padding: 0 14px 14px;
    opacity: 1;
  }
  /* Power toggle button inside the top bar */
  .mush-ac-power-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.3s, border-color 0.3s;
  }
  .mush-ac-power-btn svg { transition: stroke 0.3s; }
  .mush-ac-card.on .mush-ac-power-btn {
    background: var(--hi-18);
    border-color: var(--hi-5);
  }
  .mush-ac-card.on .mush-ac-power-btn svg { stroke: var(--accent-hi); }
  .mush-ac-row {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }
  .mush-ac-row:last-child { margin-bottom: 0; }

  /* Temperature nudge buttons */
  .mush-ac-temp-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 6px 10px;
    flex: 1;
  }
  .mush-ac-temp-val {
    font-size: 15px;
    color: #fff;
    letter-spacing: 0.05em;
    min-width: 38px;
    text-align: center;
  }
  .mush-ac-nudge {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.8);
    font-size: 16px;
    line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
    flex-shrink: 0;
    user-select: none;
  }
  .mush-ac-nudge:hover { background: rgba(255,255,255,0.14); }

  /* Mode & fan-speed buttons share the same pill style */
  .mush-ac-btn {
    flex: 1;
    padding: 5px 0;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .mush-ac-btn:hover { background: rgba(255,255,255,0.1); }

  /* ─── MUSHROOM-STYLE PURIFIER CARDS ─────────────────────────────────────────
   * Power button top-right (same pattern as AC). Speed buttons slide in below
   * when the purifier is on. Border turns teal-green when running.           */
  .mush-purifier-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    overflow: hidden;

  .mush-purifier-card.on {

  .mush-purifier-icon {

    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .mush-purifier-icon svg { transition: stroke 0.3s; }
  .mush-purifier-card.on .mush-purifier-icon { background: var(--ac-2); }
  .mush-purifier-card.on .mush-purifier-icon svg { stroke: var(--accent); }
  .mush-purifier-meta { flex: 1; min-width: 0; }
  .mush-purifier-name {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: #fff;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mush-purifier-status {
    font-size: 9px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.25em;
    margin-top: 2px;
    text-transform: uppercase;
    transition: color 0.3s;
  }
  .mush-purifier-card.on .mush-purifier-status { color: var(--ac-85); }
  .mush-purifier-pct {
    font-size: 9px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.25em;
    margin-top: 2px;
  }
  .mush-purifier-card.on .mush-purifier-pct { color: var(--ac-6); }
  /* Power button — identical pattern to AC */
  .mush-purifier-power-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.3s, border-color 0.3s;
  }
  .mush-purifier-power-btn svg { transition: stroke 0.3s; }
  .mush-purifier-card.on .mush-purifier-power-btn {
    background: var(--ac-18);
    border-color: var(--ac-5);
  }
  .mush-purifier-card.on .mush-purifier-power-btn svg { stroke: var(--accent); }
  /* Controls panel — hidden until on (same slide pattern as light slider) */
  .mush-purifier-controls {
    padding: 0 14px;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.3s ease;
  }
  .mush-purifier-card.on .mush-purifier-controls {
    max-height: 60px;
    padding: 0 14px 14px;
    opacity: 1;
  }
  /* Speed slider track — teal fill, same dimensions as brightness slider */
  .mush-purifier-track {
    flex: 1;
    height: 28px;
    border-radius: 14px;
    background: rgba(255,255,255,0.08);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .mush-purifier-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    border-radius: 14px;
    background: linear-gradient(to right, var(--ac-25), var(--ac-55));
    pointer-events: none;
    transition: width 0.05s;
  }
  .mush-purifier-input {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    margin: 0;
  }

  /* ─── MUSHROOM-STYLE COVER / BLIND CARDS ──────────────────────────────────
   * A position slider (0 = closed, 100 = open) plus Open / Stop / Close
   * quick-action buttons. The card border turns gold when the cover is open. */
  .mush-cover-card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .mush-cover-card.on { border-color: var(--ac-35); }
  .mush-cover-top {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px 10px;
  }
  .mush-cover-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s;
    cursor: pointer;
  }
  .mush-cover-card.on .mush-cover-icon { background: var(--hi-2); }
  .mush-cover-icon svg { transition: stroke 0.2s; }
  .mush-cover-card.on .mush-cover-icon svg { stroke: var(--accent-hi); }
  .mush-cover-meta { flex: 1; min-width: 0; }
  .mush-cover-name {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: #fff;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .mush-cover-pos {
    font-size: 9px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.25em;
    margin-top: 2px;
  }
  .mush-cover-card.on .mush-cover-pos { color: var(--hi-7); }

  /* Position slider row — always visible (covers have no on/off, only position) */
  .mush-cover-slider-row {
    padding: 0 14px 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .mush-cover-track {
    flex: 1;
    height: 28px;
    border-radius: 14px;
    background: rgba(255,255,255,0.08);
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .mush-cover-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    border-radius: 14px;
    background: linear-gradient(to right, var(--hi-25), var(--hi-55));
    pointer-events: none;
    transition: width 0.1s;
  }
  .mush-cover-input {
    position: absolute;
    inset: 0;

    height: 100%;
    opacity: 0;

    margin: 0;
  }
  /* Open / Stop / Close icon buttons — inline in the top row */

    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  .mush-cover-icon-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--ac-08);
    border: 1px solid var(--ac-25);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .mush-cover-icon-btn:hover { background: var(--accent-glow); border-color: var(--ac-5); }
  .mush-cover-icon-btn:active { background: var(--ac-3); }
  .mush-cover-icon-btn svg { pointer-events: none; display: block; }

  /* ─── CALENDAR POPUP EVENTS ─── */
  .event-item {
    display: flex;
    flex-direction: column;
    padding: 12px 16px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
  }
  .event-time {
    font-size: 9px;
    color: var(--accent);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .event-summary {
    font-size: 13px;
    color: #fff;
    letter-spacing: 0.05em;
  }

  /* ─── NOTIFICATION BANNER ─── */
  .notification-bar {
    display: none;
    position: fixed;
    top: 115px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 90;
    align-items: center;
    gap: 8px;
    background: var(--accent-glow);
    border: 1px solid var(--ac-6);
    border-radius: 20px;
    padding: 5px 16px;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: #fff;
    text-transform: uppercase;
    white-space: nowrap;
    backdrop-filter: blur(4px);
    pointer-events: none;
  }
  .notification-bar.visible { display: inline-flex; }
  .notification-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .notification-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ─── CONNECTION LOST BANNER ─── */
  .connection-lost-bar {
    display: none;
    position: fixed;
    top: 115px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 91;
    align-items: center;
    gap: 8px;
    background: rgba(180,40,40,0.25);
    border: 1px solid rgba(220,80,80,0.6);
    border-radius: 20px;
    padding: 5px 16px;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: #fff;
    text-transform: uppercase;
    white-space: nowrap;
    backdrop-filter: blur(4px);
    pointer-events: none;
  }
  .connection-lost-bar.visible { display: inline-flex; }
  .connection-lost-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(220,80,80,0.9);
    flex-shrink: 0;
    animation: pulse 1.2s infinite;
  }

  /* ─── MUSIC PLAYER BAR ─── */
  .music-player-bar {
    position: fixed;
    bottom: calc(var(--bottom-area-h, 130px) + 16px);
    left: 50%;
    transform: translateX(-50%);
    width: 400px;
    z-index: 35;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .music-player-bar.playing { pointer-events: all; }
  .np-content {
    display: flex;
    flex-direction: column;
    gap: 0;
    width: 100%;
  }
  .np-meta {
    margin-bottom: 6px;
    display: flex;
    justify-content: center;
    align-items: baseline;
    gap: 10px;
  }
  .np-artist {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .np-divider {
    font-size: 9px;
    color: rgba(255,255,255,0.3);
  }
  .np-track {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
  }
  .np-controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    margin-bottom: 8px;
  }
  .np-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.18s, transform 0.12s;
    opacity: 0.6;
  }
  .np-btn svg { display: block; }
  .np-btn:hover { opacity: 1; }
  .np-btn:active { transform: scale(0.88); }
  .np-btn.np-play-pause {
    width: 36px; height: 36px;
    border: 1px solid var(--ac-4);
    border-radius: 50%;
    opacity: 0.85;
    transition: opacity 0.18s, transform 0.12s, border-color 0.18s;
  }
  .np-btn.np-play-pause:hover { opacity: 1; border-color: var(--hi-8); }
  .np-progress-bg {
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.2);
    overflow: hidden;
  }
  .np-progress-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    transition: width 1s linear;
  }
  /* ─── THEME BUTTON (icon-only, square) ─── */
  .theme-btn {
    padding: 7px 10px !important;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ─── THEME PICKER POPUP ─── */
  .popup--theme { max-width: 320px; }
  .theme-picker-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .theme-option {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 13px 16px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    font-family: 'Montserrat', sans-serif;
    color: #fff;
    text-align: left;
  }
  .theme-option:hover { background: rgba(255,255,255,0.09); }
  .theme-option.active {
    background: rgba(255,255,255,0.09);
    border-color: rgba(255,255,255,0.3);
  }
  .theme-swatch {
    width: 18px; height: 18px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px rgba(0,0,0,0.4);
  }
  .theme-name {
    flex: 1;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .theme-check {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
    width: 16px;
    text-align: right;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .theme-option.active .theme-check { opacity: 1; }
</style>
</head>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
 * SETUP — Search for "YOUR_" to find every value you need to personalise
 * ═══════════════════════════════════════════════════════════════════════════
 *
 *  YOUR_HA_LONG_LIVED_ACCESS_TOKEN  → HA → Profile → Long-Lived Access Tokens
 *  YOUR_HA_IP                       → IP/hostname of your HA instance
 *                                     (e.g. 192.168.1.100)
 *  YOUR_BACKGROUND_IMAGE_URL        → Hero background (Unsplash URL or /local/…)
 *  YOUR_PET_NAME                    → Your pet's name
 *  YOUR_*_ENTITY / YOUR_*_GROUP     → HA entity IDs — find them in
 *                                     HA → Developer Tools → States
 *
 * ═══════════════════════════════════════════════════════════════════════════ */
/* ═══════════════════════════════════════════════════════════════════════════
 * DASHBOARD CONFIGURATION
 * ═══════════════════════════════════════════════════════════════════════════
 * This is the main configuration object. Edit the sections below to
 * customise the dashboard for your home.
 *
 * Key concepts:
 *   entity   — the Home Assistant entity ID (e.g. "light.living_room")
 *   label    — the display name shown on the dashboard
 *   unit     — optional unit appended to sensor values (e.g. "°C", "%")
 *   onValue  — text to show when the entity state is "on" / "open" / etc.
 *   offValue — text to show when the entity state is "off" / "closed" / etc.
 * ═══════════════════════════════════════════════════════════════════════════ */
const CONFIG = {

  /* ── WELCOME GREETING ────────────────────────────────────────────────────
   * Automatically changes based on the time of day.
   * You can adjust the hour ranges below to suit your schedule. */
  get welcomeText() {
    const h = new Date().getHours();
    if (h >= 5 && h < 12)  return "GOOD MORNING";
    if (h >= 12 && h < 18) return "GOOD AFTERNOON";
    if (h >= 18 && h < 22) return "GOOD EVENING";
    return "GOOD NIGHT";
  },

  /* ── MUSIC PLAYER ──────────────────────────────────────────────────────────
   * The HA media_player entity to display in the Now Playing bar.
   * Only shown on the Overview screen. */
  musicEntity: "media_player.YOUR_MEDIA_PLAYER",
  /* ── CALENDAR ──────────────────────────────────────────────────────────────
   * List of HA calendar entities to pull upcoming events from.
   * Add as many as you like — events are merged and sorted by date. */
  calendarEntities: ["calendar.YOUR_CALENDAR_1", "calendar.YOUR_CALENDAR_2"],

  /* ── HOME OVERVIEW STATS ───────────────────────────────────────────────────
   * Stats shown in the hero area on the Overview screen.
   * Each entry needs: label, entity, onValue, offValue.
   * Up to 10 stats display in a 5-column grid. */
  homeStats: [
    { label: "Doors",       entity: "binary_sensor.YOUR_DOORS_SENSOR",          onValue: "Open",     offValue: "Closed" },
    { label: "Windows",     entity: "binary_sensor.YOUR_DOORS_SENSOR",          onValue: "Open",     offValue: "Closed" },
    { label: "Alarm",       entity: "alarm_control_panel.YOUR_ALARM",       onValue: "Armed",    offValue: "Disarmed" },
    { label: "Cameras",     entity: "switch.YOUR_CAMERA_PRIVACY_SWITCH",       onValue: "Off",      offValue: "Active" },
    { label: "Motion",      entity: "binary_sensor.YOUR_MOTION_SENSOR", onValue: "Detected", offValue: "Clear" },
    { label: "Lights",      entity: "light.YOUR_ALL_LIGHTS_GROUP",                 onValue: "On",       offValue: "Off" },
    { label: "Air Con",     entity: "group.YOUR_ALL_AC_GROUP",               onValue: "On",       offValue: "Off" },
    { label: "Purifiers",   entity: "fan.YOUR_ALL_PURIFIERS_GROUP",                onValue: "On",       offValue: "Off" },
    { label: "W. Heater",   entity: "switch.YOUR_WATER_HEATER",       onValue: "On",       offValue: "Off" },
    { label: "T. Warmer",   entity: "group.YOUR_ALL_AC_GROUP",               onValue: "On",       offValue: "Off" },
  ],

  /* ── WEATHER ───────────────────────────────────────────────────────────────
   * HA weather entity shown at the top-centre of the dashboard.
   * Change tempUnit to "°F" if you prefer Fahrenheit. */
  weather: {
    entity: "weather.YOUR_WEATHER_ENTITY",
    tempUnit: "°C",
  },

  /* ── SENSOR ROW ────────────────────────────────────────────────────────────

const BASE = window.location.origin;
// Paste your Home Assistant Long-Lived Access Token between the quotes below.
// Generate one in HA → Profile → Long-Lived Access Tokens.
const HA_TOKEN = "YOUR_HA_LONG_LIVED_ACCESS_TOKEN";

/* ─── SECURITY HELPERS ──────────────────────────────────────────────────────
 * safeText(id, value)
 *   Safely updates an element's text content from a HA state value.
 *   Always prefer this over element.textContent = value for HA data,
 *   so unexpected characters can never be interpreted as HTML.
 *
 * escapeHtml(str)
 *   Escapes a string for safe use inside an innerHTML template string.
 *   Use this whenever CONFIG labels or HA values are embedded in HTML.
 * ─────────────────────────────────────────────────────────────────────────── */
function safeText(elementId, value) {
  const el = document.getElementById(elementId);
  if (el) el.textContent = (value !== undefined && value !== null) ? String(value) : "—";
}

function escapeHtml(str) {
  return String(str ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

/* ─── STATE CACHE ─── */
// Single map of entity_id → state object, kept live by the WebSocket subscription.
let stateCache = new Map(); // Keyed by entity_id → full HA state object

// Timestamp of the last full cache load — used only for the fallback poll guard.
let _lastCacheRefreshMs = 0;

/* ─── WEBSOCKET CONNECTION ──────────────────────────────────────────────────
 * The dashboard connects to the HA WebSocket API at CONFIG.wsUrl.
 * On connect it authenticates, loads all states in one go, then subscribes
 * to state_changed events so every entity update arrives within milliseconds.
 *
 * Service calls (haCall / haService) still use the REST API — WS for reads,
 * HTTP for writes — which keeps the call side simple and stateless.
 *
 * Reconnection uses exponential backoff (1 s → 2 s → 4 s … capped at 30 s).
 * ────────────────────────────────────────────────────────────────────────── */
let _ws              = null;   // active WebSocket instance
let _wsReady         = false;  // true once auth+subscribe handshake is done
let _wsMsgId         = 1;      // incrementing message ID counter
let _wsReconnectDelay = 1000;  // current backoff delay in ms
let _wsReconnectTimer = null;  // pending reconnect setTimeout handle

/** Allocate the next WS message ID */
function _wsNextId() { return _wsMsgId++; }

/** Show or hide the connection-lost banner */
function _wsSetConnected(ok) {
  document.getElementById("connection-lost-bar")
    ?.classList.toggle("visible", !ok);
}

/**
 * _wsConnect — opens a new WebSocket and wires up the full HA handshake:
 *   1. auth_required  → send auth message with HA_TOKEN
 *   2. auth_ok        → send get_states + subscribe_events(state_changed)
 *   3. result(get_states) → seed stateCache, render UI
 *   4. event(state_changed) → patch stateCache entry, re-render UI
 *   5. close/error    → schedule reconnect with exponential backoff
 */
function _wsConnect() {
  if (_ws) { try { _ws.close(); } catch {} }
  _wsReady = false;

  let getStatesId   = null;
  let subscribeId   = null;

  try {
    _ws = new WebSocket(CONFIG.wsUrl);
  } catch (e) {
    _wsScheduleReconnect();
    return;
  }

  _ws.onopen = () => {
    // HA sends auth_required immediately after the socket opens — wait for it.
  };

  _ws.onmessage = (evt) => {
    let msg;
    try { msg = JSON.parse(evt.data); } catch { return; }

    switch (msg.type) {

      /* ── Step 1: server asks for auth ── */
      case "auth_required":
        _ws.send(JSON.stringify({ type: "auth", access_token: HA_TOKEN }));
        break;

      /* ── Step 2: auth accepted ── */
      case "auth_ok":
        _wsSetConnected(true);
        _wsReconnectDelay = 1000; // reset backoff on successful auth

        // Load all current states in one shot
        getStatesId = _wsNextId();
        _ws.send(JSON.stringify({ id: getStatesId, type: "get_states" }));

        // Subscribe to state_changed events
        subscribeId = _wsNextId();
        _ws.send(JSON.stringify({
          id: subscribeId,
          type: "subscribe_events",
          event_type: "state_changed"
        }));
        break;

      /* ── Auth rejected ── */
      case "auth_invalid":
        console.error("[WS] Auth failed — check HA_TOKEN");
        _wsSetConnected(false);
        // Don't reconnect on bad token — it will just fail again
        break;

      /* ── Step 3: result messages ── */
      case "result":
        if (msg.id === getStatesId && msg.success && Array.isArray(msg.result)) {
          // Seed the cache with the full state snapshot
          stateCache = new Map(msg.result.map(s => [s.entity_id, s]));
          _lastCacheRefreshMs = Date.now();
          _wsReady = true;
          // Sync derived state and render
          syncAcCardStateFromCache();
          syncPurifierCardStateFromCache();
          refreshAllUI();
        }
        break;

      /* ── Step 4: live state_changed events ── */
      case "event":
        if (!_wsReady) break;
        if (msg.id === subscribeId && msg.event?.event_type === "state_changed") {
          const newState = msg.event.data?.new_state;
          if (newState?.entity_id) {
            stateCache.set(newState.entity_id, newState);
            // Only sync AC/purifier derived state when popup is closed
            const popupOpen = document.getElementById("popup-overlay")
              ?.classList.contains("open");
            if (!popupOpen) {
              syncAcCardStateFromCache();
              syncPurifierCardStateFromCache();
            }
            refreshAllUI();
          }
        }
        break;

      default:
        break;
    }
  };

  _ws.onerror = () => {
    _wsSetConnected(false);
  };

  _ws.onclose = () => {
    _wsReady = false;
    _wsSetConnected(false);
    _wsScheduleReconnect();
  };
}

/** Schedule a reconnect attempt with exponential backoff (max 30 s) */
function _wsScheduleReconnect() {
  if (_wsReconnectTimer) clearTimeout(_wsReconnectTimer);
  _wsReconnectTimer = setTimeout(() => {
    _wsReconnectTimer = null;
    _wsConnect();
  }, _wsReconnectDelay);
  _wsReconnectDelay = Math.min(_wsReconnectDelay * 2, 30_000);
}

/**
 * refreshStateCache — kept as a thin shim so existing call-sites in refreshAll
 * continue to work. When the WebSocket is live this is a no-op (state is
 * already up-to-date). When disconnected it falls back to the REST bulk fetch
 * so the UI stays usable even if the WS drops temporarily.
 */
async function refreshStateCache() {
  if (_wsReady) return; // WS is live — cache is already current, nothing to do
  // Fallback: REST bulk fetch (same as the old polling path)
  try {
    const r = await fetch(`${BASE}/api/states`, {
      headers: { Authorization: `Bearer ${HA_TOKEN}` }
    });
    if (!r.ok) { _wsSetConnected(false); return; }
    const all = await r.json();
    stateCache = new Map(all.map(s => [s.entity_id, s]));
    _lastCacheRefreshMs = Date.now();
    _wsSetConnected(true);
  } catch {
    _wsSetConnected(false);
  }
}

/**
 * haGet — returns an entity state from the in-memory cache (always fresh when
 * the WebSocket is live). Falls back to a direct REST call only when the cache
 * is empty (cold start before the WS get_states response arrives).
 */
async function haGet(entityId) {
  if (!entityId || !HA_TOKEN) return null;
  if (stateCache.has(entityId)) return stateCache.get(entityId);
  // Cache miss (very early startup) — fetch directly
  try {
    const r = await fetch(`${BASE}/api/states/${entityId}`, {
      headers: { Authorization: `Bearer ${HA_TOKEN}` }
    });
    if (!r.ok) return null;
    const d = await r.json();
    stateCache.set(entityId, d);
    return d;
  } catch { return null; }
}

// Synchronous cache read — returns null on miss, never fetches.
function haGetCached(entityId) {
  return entityId ? (stateCache.get(entityId) ?? null) : null;
}

async function haCall(domain, service, entityId) {
  if (!entityId || !HA_TOKEN) return;
  try {
    await fetch(`${BASE}/api/services/${domain}/${service}`, {
      method: "POST",
      headers: { Authorization: `Bearer ${HA_TOKEN}`, "Content-Type": "application/json" },
      body: JSON.stringify({ entity_id: entityId })
    });
    // No need to invalidate the cache — the WS state_changed event will update
    // it within milliseconds of the service call completing.
  } catch {}
}

/**
 * haService — shared helper for all HA service calls that take custom body data.
 * Replaces the inline fetch boilerplate that was duplicated across AC, cover,
 * light, purifier, and media functions. Always uses the configured HA_TOKEN.
 * @param {string} domain  — HA domain (e.g. "climate", "light", "cover")
 * @param {string} service — HA service name (e.g. "set_hvac_mode", "turn_on")
 * @param {Object} data    — body payload sent as JSON
 */
async function haService(domain, service, data) {
  if (!HA_TOKEN) return;
  try {
    await fetch(`${BASE}/api/services/${domain}/${service}`, {
      method: "POST",
      headers: { Authorization: `Bearer ${HA_TOKEN}`, "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });
    // State update will arrive via the WS state_changed subscription automatically.
  } catch {}
}

/* ─── HAPTIC FEEDBACK ───────────────────────────────────────────────────────
 * haptic(type) — triggers the Vibration API if the device supports it.
 * Silently no-ops on browsers/devices that don't (desktop, iOS Safari < 17).
 *
 * Three intensities map to the feel of each interaction:
 *   "light"  — navigation / open / close / accordion expand  (single short tap)
 *   "medium" — toggle on or off, fan/temp adjustment         (slightly longer)
 *   "heavy"  — scene fire, AC power, destructive actions     (firm double-tap)
 *
 * Durations are milliseconds. A single-item array is a single buzz.
 * The three-value array form [on, off, on] produces a double-tap pattern.
 * ────────────────────────────────────────────────────────────────────────── */
const HAPTIC_PATTERNS = {
  light:  [18],
  medium: [35],
  heavy:  [30, 60, 50],
};

function haptic(type = "medium") {
  try {
    if (navigator.vibrate) navigator.vibrate(HAPTIC_PATTERNS[type] ?? HAPTIC_PATTERNS.medium);
  } catch {}
}

/**
 * refreshWeather — reads the weather entity from cache and updates
 * the icon, temperature, and description in the top-centre bar.
 */
function refreshWeather() {
  const d = haGetCached(CONFIG.weather.entity);
  if (!d) return;
  const state = d.state;
  const attrs = d.attributes || {};
  document.getElementById("wx-icon").innerHTML = WX_ICONS[state] || WX_ICON_DEFAULT;

const DAYS = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

/**
 * tickClock — updates only the clock and date display.
 * Runs every second so the displayed time is never more than 1 s stale,
 * even if the user returns to the tab just after a minute boundary.
 */
function tickClock() {
  const n = new Date();
  const h = String(n.getHours()).padStart(2,"0");
  const m = String(n.getMinutes()).padStart(2,"0");
  const clockEl = document.getElementById("top-clock");
  if (clockEl) clockEl.textContent = h + ":" + m;
  const dateEl = document.getElementById("top-date");
  if (dateEl) dateEl.textContent = `${DAYS[n.getDay()]}, ${n.getDate()} ${MONTHS[n.getMonth()]}`;
}

/**
 * tick — refreshes the welcome greeting in case midnight has passed.
 * Called every 10 seconds alongside the HA state poll.
 * Clock and date are handled separately by tickClock (1-second interval).
 */
function tick() {
  const titleEl = document.getElementById("hero-title");
  if (titleEl) titleEl.textContent = CONFIG.welcomeText;
}

let activeControls = CONFIG.controls;

/**
 * renderHomeStats — builds the stat grid HTML for the Overview screen
 * and returns it as a string. Call refreshHomeStats() after to populate values.
 */
function renderHomeStats() {
  document.getElementById("hero-stats").className = "hero-stats";
  return CONFIG.homeStats.map(s => `
    <div class="stat">
      <div class="stat-label">${escapeHtml(s.label)}</div>
      <div class="stat-value" id="hs-${s.label.replace(/\s/g,'_')}">—</div>
    </div>
  `).join('');
}

/**
 * refreshHomeStats — reads each homeStats entity from the cache and
 * updates its value and on/off colour class in the Overview stat grid.
 */
function refreshHomeStats() {
  for (const s of CONFIG.homeStats) {
    if (!s.entity) continue;
    const d = haGetCached(s.entity);
    const el = document.getElementById(`hs-${s.label.replace(/\s/g,'_')}`);
    if (!el || !d) continue;
    const val = d.state;
    let display, cls = "";
    if (s.onValue) {
      const domain = s.entity.split(".")[0];
      let isOn;
      if (domain === "cover") {
        isOn = ["open","opening"].includes(val);
      } else {
        isOn = ["on","locked","armed_away","armed_home","running"].includes(val);
      }
      display = isOn ? s.onValue : s.offValue;
      cls = isOn ? "on" : "off";
    } else {
      display = val + (s.unit || "");
    }
    safeText(`hs-${s.label.replace(/\s/g,"_")}`, display);
    el.className = "stat-value " + cls;
  }
}

/**
 * refreshSensors — updates the bottom sensor pill bar values from cache.
 * Skipped when not on the overview (sensor-row is not in the DOM).
 */
function refreshSensors() {
  const fs = CONFIG.floorSensors;
  if (!fs) return;

  const fmt = (entity, decimal) => {
    const d = haGetCached(entity);
    if (!d) return "—";
    const v = parseFloat(d.state);
    return isNaN(v) ? "—" : (decimal ? v.toFixed(1) : Math.round(v));
  };

  for (const floorKey of ["ground", "upper"]) {
    const f = fs[floorKey];
    if (!f) continue;
    const tempEl = document.getElementById(`fl-${floorKey}-temp`);
    const humEl  = document.getElementById(`fl-${floorKey}-hum`);
    const pmEl   = document.getElementById(`fl-${floorKey}-pm`);
    if (tempEl) tempEl.textContent = fmt(f.temp.entity,     f.temp.decimal)     + f.temp.unit;
    if (humEl)  humEl.textContent  = fmt(f.humidity.entity, f.humidity.decimal) + f.humidity.unit;
    if (pmEl)   pmEl.textContent   = fmt(f.pm25.entity,     f.pm25.decimal)     + " " + f.pm25.unit;
  }

  const pw = CONFIG.powerSensor;
  if (pw) {
    const pwEl = document.getElementById("sensor-power-val");
    if (pwEl) pwEl.textContent = fmt(pw.entity, pw.decimal) + " " + pw.unit;
  }

  const sol = CONFIG.solarSensors;
  if (sol) {
    const prodEl = document.getElementById("sensor-solar-prod");
    const expEl  = document.getElementById("sensor-solar-exp");
    const batEl  = document.getElementById("sensor-solar-bat");
    const tmpEl  = document.getElementById("sensor-solar-tmp");
    if (prodEl) prodEl.textContent = fmt(sol.production.entity, sol.production.decimal) + " " + sol.production.unit;
    if (expEl)  expEl.textContent  = fmt(sol.export.entity,     sol.export.decimal)     + " " + sol.export.unit;
    if (batEl)  batEl.textContent  = fmt(sol.battery.entity,    sol.battery.decimal)    + sol.battery.unit;
    if (tmpEl)  tmpEl.textContent  = fmt(sol.temp.entity,       sol.temp.decimal)       + sol.temp.unit;
  }
}
